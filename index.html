<!-- =========================
     SECTION 1: HEAD + CSS
     ========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Spin</title>

  <style>
    :root {
      --accent: #d6a84f;
      --accent-soft: rgba(214,168,79,0.25);

      --page-bg: url("background.png");
      --game-bg: none;

      --ui-bg: rgba(0,0,0,0.54);
      --ui-bg-soft: rgba(0,0,0,0.42);
      --ui-border: 1px solid rgba(255,255,255,0.12);
      --ui-radius: 10px;
      --ui-shadow: inset 0 0 8px rgba(0,0,0,0.58);

      --button-bg: rgba(0,0,0,0.58);
      --button-border: 1px solid #7a5a22;
      --button-radius: 8px;

      --slot-bg: rgba(0,0,0,0);
      --cell-bg: rgba(0,0,0,0.1);
    }

    html {
      min-height: 100%;
      background: #050505;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 12px;
      background-color: #050505;
      background-image:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.42)),
        var(--page-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: scroll;
      overflow-x: hidden;
    }

    .game {
      width: 570px;
      margin-left: auto;
      margin-right: auto;
      background-color: rgba(0,0,0,0.10);
      background-image:
        linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0)),
        var(--game-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      border: 2px solid var(--accent);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.82);
      backdrop-filter: none;
    }

    .logoText {
      color: var(--accent);
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(0,0,0,0.85);
    }

    .uiPanel,
    .specialSettings,
    .winCard,
    .statsPanel {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: var(--ui-radius);
      box-shadow: var(--ui-shadow);
    }

    .uiCell,
    .readout,
    .tokenReadout {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: 8px;
      box-shadow: var(--ui-shadow);
    }

    .uiButton,
    .arrowButton,
    .codeButton,
    .devButton,
    .resetButton {
      background: var(--button-bg);
      border: var(--button-border);
      border-radius: var(--button-radius);
      color: var(--accent);
      cursor: pointer;
    }

    .slotFrame {
      position: relative;
      margin: 8px auto 12px;
      width: fit-content;
      height: 390px;
      overflow: hidden;
      padding: 8px;
      border-radius: 18px;
      background: var(--slot-bg);
      border: var(--ui-border);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.78);
    }

    .slotGrid {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      grid-template-rows: repeat(5, 80px);
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
      transform: translateY(-18px);
    }

    .cell {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: var(--cell-bg);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .teaserCell {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
      transform: scaleY(0.5) scaleX(0.92);
    }

    .activeCell {
      opacity: 1;
      filter: none;
    }

    .spinning {
      animation: shake 0.08s linear infinite;
      filter: none;
    }

    .teaserCell.spinning {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
    }

    .winningCell {
      border: 2px solid var(--accent);
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.8),
        0 0 16px var(--accent),
        0 0 28px var(--accent-soft);
    }

    .wildCell {
      border: 2px solid white;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.8),
        0 0 18px rgba(255,255,255,0.9),
        0 0 32px var(--accent-soft);
    }

    @keyframes shake {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(6px); }
    }

    .lineOverlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      display: block;
      opacity: 0.95;
    }

    .lineOverlay svg {
      width: 100%;
      height: 100%;
    }

    .lineOverlay polyline {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px currentColor);
      opacity: 0.85;
    }

    .lineOverlay polygon {
      filter: drop-shadow(0 0 4px currentColor);
      opacity: 0.95;
    }

    .lineOverlay .lineLabel {
      font-size: 15px;
      font-weight: bold;
      filter: drop-shadow(0 0 3px black);
    }

    .winPopup {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 6;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .winPopup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .controlPanel {
      margin-top: 8px;
      padding: 6px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .controlTopRow,
    .controlBottomRow,
    .gemRow {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .controlTopRow {
      grid-template-columns: 1fr 1.4fr;
      margin-bottom: 5px;
    }

    .controlBottomRow {
      grid-template-columns: 1fr 1fr 1.25fr;
    }

    .gemRow {
      grid-template-columns: 1fr 1fr 1.25fr;
      margin-top: 0;
      min-height: 42px;
    }

    .readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      padding: 4px 6px;
      color: #ddd;
    }

    .readoutLabel {
      color: #aaa;
      font-size: 13px;
      min-width: 34px;
      text-align: right;
    }

    .readoutValue {
      color: var(--accent);
      font-size: 16px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
    }

    .tokenReadout {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 34px;
      padding: 4px 6px;
      line-height: 1.1;
      color: var(--accent);
      font-weight: bold;
    }

    .tokenReadout span:first-child {
      color: #aaa;
      font-size: 11px;
      font-weight: normal;
    }

    #tokenBalance {
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .arrowButton {
      width: 22px;
      height: 24px;
      padding: 0;
      margin: 0;
      font-size: 15px;
      font-weight: bold;
    }

    .spinButton {
      width: 100%;
      height: 42px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-soft);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chaosGem {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chaosGem img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      pointer-events: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .chaosGem:hover img {
      transform: scale(1.08);
    }

    .gemMessage {
      min-height: 16px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      opacity: 0.95;
    }

    .gem-clear img {
      filter: brightness(1.15) saturate(0.45)
        drop-shadow(0 0 6px rgba(190,230,255,0.45));
    }

    .gem-ruby img,
    .reelGem.gem-ruby {
      filter: sepia(1) saturate(5) hue-rotate(310deg) brightness(1.15)
        drop-shadow(0 0 12px #e31b4f);
    }

    .gem-emerald img,
    .reelGem.gem-emerald {
      filter: sepia(1) saturate(4) hue-rotate(85deg) brightness(1.15)
        drop-shadow(0 0 12px #20c56b);
    }

    .gem-amethyst img,
    .reelGem.gem-amethyst {
      filter: sepia(1) saturate(4) hue-rotate(235deg) brightness(1.2)
        drop-shadow(0 0 12px #9b5de5);
    }

    .gem-sapphire img,
    .reelGem.gem-sapphire {
      filter: sepia(1) saturate(4) hue-rotate(185deg) brightness(1.15)
        drop-shadow(0 0 12px #2f6fff);
    }

    .gem-topaz img,
    .reelGem.gem-topaz {
      filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.25)
        drop-shadow(0 0 12px #f5b642);
    }

    .gem-skull {
      font-size: 31px;
      color: #d8d8d8;
      text-shadow: 0 0 14px rgba(255,255,255,0.95);
    }

    .reelGem.gem-skull {
      filter: grayscale(1) brightness(1.4)
        drop-shadow(0 0 12px #ffffff);
    }

    .specialSettings {
      margin-top: 12px;
      padding: 10px;
      text-align: left;
    }

    .specialTitle {
      color: var(--accent);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
    }

    .themeControl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .themeValue {
      color: var(--accent);
      min-width: 80px;
      text-align: center;
      font-weight: bold;
    }

    .lastSpin {
      margin-top: 8px;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
      min-height: 0;
      display: none;
    }

    .statsPanel {
      display: none;
      margin-top: 10px;
      padding: 10px;
      font-size: 12px;
      color: #ddd;
    }

    .statsPanel.visible {
      display: block;
    }

    .statRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .statRow:last-child {
      border-bottom: none;
    }

    .judgementGood {
      color: #39ff88;
      font-weight: bold;
    }

    .judgementSuspicious {
      color: #f5b642;
      font-weight: bold;
    }

    .judgementVoid {
      color: #ff4444;
      font-weight: bold;
    }

    .devTools {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .devTools.visible {
      display: block;
    }

    .devSectionTitle {
      color: var(--accent);
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      margin: 8px 0 6px;
    }

    .devButtonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .devButton {
      color: #ddd;
      padding: 7px 5px;
      font-size: 11px;
    }

    .devButton:hover,
    .arrowButton:hover,
    .codeButton:hover,
    .resetButton:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .winInfo {
      margin-top: 12px;
      border-top: 1px solid #333;
      padding-top: 10px;
      text-align: left;
      font-size: 13px;
      color: #ddd;
    }

    .winCard {
      padding: 10px;
      line-height: 1.5;
    }

    .winCard strong {
      display: block;
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 14px;
      text-align: center;
    }

    .winRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 3px 0;
    }

    .winRow:last-child {
      border-bottom: none;
    }

    .winGap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .bottomStats {
      margin-top: 12px;
      color: #777;
      font-size: 13px;
    }

    .codeArea {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .codeInput {
      background: var(--button-bg);
      color: #ddd;
      border: var(--ui-border);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      outline: none;
    }

    .codeInput:focus {
      border-color: var(--accent);
    }

    .codeButton {
      padding: 8px 12px;
      font-size: 13px;
    }

    .codeMessage {
      margin-top: 6px;
      color: #888;
      font-size: 12px;
      min-height: 16px;
    }

    .resetButton {
      margin-top: 10px;
      width: 100%;
      color: #999;
      font-size: 12px;
      padding: 8px;
    }

    @media (max-width: 600px) {
      .game {
        width: 94vw;
        padding: 10px;
      }

      .slotGrid {
        grid-template-columns: repeat(5, 64px);
        grid-template-rows: repeat(5, 64px);
        gap: 8px;
        transform: translateY(-14px);
      }

      .cell {
        width: 64px;
        height: 64px;
        font-size: 30px;
      }

      .slotFrame {
        height: 310px;
      }

      .controlTopRow,
      .controlBottomRow,
      .gemRow {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .readout,
      .tokenReadout {
        min-height: 30px;
        padding: 3px 5px;
      }

      #tokenBalance {
        font-size: 12px;
      }

      .spinButton {
        height: 38px;
      }

      .winPopup {
        font-size: 20px;
        bottom: 16px;
      }

      .devButtonGrid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>

<!-- =========================
     SECTION 2: HTML BODY
     ========================= -->

</head>

<body>
  <div class="game">
    <div class="logoText">Forge Spin</div>

    <div class="slotFrame">
      <div class="lineOverlay" id="lineOverlay"></div>
      <div class="slotGrid" id="slotGrid"></div>
      <div class="winPopup" id="winPopup"></div>
    </div>

    <div class="controlPanel">
      <div class="controlTopRow">
        <div class="readout">
          <span class="readoutLabel">Lines</span>
          <button class="arrowButton" onclick="changeLineCount(-1)">‹</button>
          <span class="readoutValue" id="lineCountDisplay">15</span>
          <button class="arrowButton" onclick="changeLineCount(1)">›</button>
        </div>

        <div class="tokenReadout">
          <span>Forge Tokens</span>
          <span id="tokenBalance">000,000,000,000</span>
        </div>
      </div>

      <div class="controlBottomRow">
        <div class="readout">
          <span class="readoutLabel">Bet</span>
          <button class="arrowButton" onclick="changeBaseBet(-1)">‹</button>
          <span class="readoutValue" id="baseBetDisplay">Free</span>
          <button class="arrowButton" onclick="changeBaseBet(1)">›</button>
        </div>

        <div class="readout">
          <span class="readoutLabel">Multi</span>
          <button class="arrowButton" onclick="changeMultiplier(-1)">‹</button>
          <span class="readoutValue" id="multiplierDisplay">1x</span>
          <button class="arrowButton" onclick="changeMultiplier(1)">›</button>
        </div>

        <button class="spinButton" id="spinButton" onclick="spin()">FREE</button>
      </div>

      <div class="gemRow">
        <div></div>

        <div>
          <button class="chaosGem gem-clear" id="chaosGem" onclick="activateGem()" title="Chaos Gem">
            <img src="gem.png" alt="Chaos Gem">
          </button>
          <div class="gemMessage" id="gemMessage"></div>
        </div>

        <div></div>
      </div>
    </div>

    <div class="specialSettings">
      <div class="specialTitle">Special Settings</div>

      <div class="themeControl">
        <button class="arrowButton" onclick="changeTheme(-1)">‹</button>
        <span>Theme</span>
        <span class="themeValue" id="themeDisplay">Default</span>
        <button class="arrowButton" onclick="changeTheme(1)">›</button>
      </div>

      <div class="themeControl" style="margin-top:8px;">
        <button class="arrowButton" onclick="toggleStats()">‹</button>
        <span>Statistics</span>
        <button class="arrowButton" onclick="toggleStats()">›</button>
      </div>

      <div class="statsPanel" id="statsPanel">
        <div class="devSectionTitle">Winky’s Judgement</div>
        <div id="statsContent"></div>
      </div>

      <div class="lastSpin" id="lastSpin">No spin yet.</div>

      <div class="devTools" id="devTools">
        <div class="devSectionTitle">Theme Tools</div>

        <div class="devButtonGrid">
          <button class="devButton" onclick="unlockAllThemes()">Unlock All</button>
          <button class="devButton" onclick="activateThemeDev('Maya')">Activate Maya</button>
          <button class="devButton" onclick="activateThemeDev('Reign')">Activate Reign</button>
          <button class="devButton" onclick="activateThemeDev('Kyra')">Activate Kyra</button>
          <button class="devButton" onclick="activateThemeDev('Nadia')">Activate Nadia</button>
          <button class="devButton" onclick="activateThemeDev('Winky')">Activate Winky</button>
        </div>

        <div class="devSectionTitle">Token Tools</div>

        <div class="devButtonGrid">
          <button class="devButton" onclick="addDevTokens()">+100,000,000</button>
          <button class="devButton" onclick="quickSpin(100)">Quick Spin x100</button>
          <button class="devButton" onclick="quickSpin(500)">Quick Spin x500</button>
        </div>
      </div>
    </div>

    <div class="winInfo" id="winInfo"></div>

    <div class="bottomStats">
      Total Spins: <span id="spinCount">0</span>
    </div>

    <div class="codeArea">
      <input class="codeInput" id="codeInput" placeholder="Enter code" autocomplete="off">
      <button class="codeButton" onclick="applyCode()">Apply</button>
    </div>

    <div class="codeMessage" id="codeMessage"></div>

    <button class="resetButton" onclick="resetGame()">Reset Game</button>
  </div>

  <script>


    // =========================
    // SECTION 3: SETTINGS / SYMBOLS / STATE
    // =========================

    // =========================
    // CORE SETTINGS
    // =========================

    const VISIBLE_ROWS = 5;
    const COLS = 5;

    const baseBetOptions = [0, 25, 50, 75, 100];
    const multiplierOptions = [1, 2, 10, 50, 100, 500, 1000, 2500, 5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000, 2500000, 5000000, 10000000, 25000000, 50000000];
    const lineCountOptions = [5, 10, 15];

    const defaultLineColors = [
      "#f0c35a", "#55d6ff", "#ff4fd8", "#60ff7a", "#ff7a32",
      "#ffffff", "#a855ff", "#00ffd5", "#ff4444", "#99ff33",
      "#ffd166", "#4cc9f0", "#f72585", "#80ffdb", "#f8961e"
    ];

    let lineColors = [...defaultLineColors];

    // =========================
    // THEME SETTINGS
    // pageImage = outer website/page background
    // gameImage = background inside the slot machine body
    // Default uses transparent game body
    // =========================

    const themes = {
      Default: {
        accent: "#d6a84f",
        pageImage: 'url("background.png")',
        gameImage: "none",
        lineColors: defaultLineColors
      },

      Maya: {
        accent: "#D13A2F",
        pageImage: 'url("background.png")',
        gameImage: 'url("mayatheme.png")',
        lineColors: [
          "#8fdcff", "#ffffff", "#4cc9f0", "#bdefff", "#55d6ff",
          "#d6a84f", "#80ffdb", "#99e6ff", "#c9f7ff", "#78cfff",
          "#a8e6ff", "#e6fbff", "#66d9ff", "#f0c35a", "#ffffff"
        ]
      },

      Reign: {
        accent: "#8A4A2A",
        pageImage: 'url("background.png")',
        gameImage: 'url("reigntheme.png")',
        lineColors: [
          "#c46a35", "#ff9b4f", "#f0c35a", "#ffffff", "#9b4a22",
          "#ff6b35", "#d97941", "#ffaa66", "#ffd166", "#b4532a",
          "#f8961e", "#e76f51", "#f4a261", "#ffb703", "#ffffff"
        ]
      },

      Kyra: {
        accent: "#36A3FF",
        pageImage: 'url("background.png")',
        gameImage: 'url("kyratheme.png")',
        lineColors: [
          "#9b5de5", "#f72585", "#4cc9f0", "#ffffff", "#7209b7",
          "#b5179e", "#560bad", "#a855ff", "#00ffd5", "#c77dff",
          "#e0aaff", "#3a0ca3", "#ff4fd8", "#80ffdb", "#ffffff"
        ]
      },

      Nadia: {
        accent: "#9B5DE5",
        pageImage: 'url("background.png")',
        gameImage: 'url("nadiatheme.png")',
        lineColors: [
          "#d6a84f", "#9b5de5", "#f0c35a", "#ffffff", "#c77dff",

    // =========================
    // LINE PREVIEW OVERLAY
    // =========================

    function getGridMetrics() {
      const mobile = window.innerWidth <= 600;
      const cellSize = mobile ? 64 : 80;
      const gap = 8;
      const pitch = cellSize + gap;
      const gridTop = mobile ? -10 : -10;
      const gridLeft = 8;

      return {
        viewW: mobile ? 370 : 456,
        viewH: mobile ? 310 : 390,
        cellSize,
        gap,
        pitch,
        gridTop,
        gridLeft
      };
    }

    function getLinePoints(line) {
      const m = getGridMetrics();

      const rowMap = {
        1: m.gridTop + m.pitch * 1 + m.cellSize / 2,
        2: m.gridTop + m.pitch * 2 + m.cellSize / 2,
        3: m.gridTop + m.pitch * 3 + m.cellSize / 2
      };

      const colX = col => m.gridLeft + m.pitch * col + m.cellSize / 2;

      return line.rows.map((row, col) => ({
        x: colX(col),
        y: rowMap[row]
      }));
    }

    function drawSingleLinePreview() {
      if (!lineOverlayVisible) return;

      const activeLines = getActivePaylines();
      if (activeLines.length === 0) return;

      const line = activeLines[linePreviewIndex % activeLines.length];
      const color = lineColors[linePreviewIndex % lineColors.length];
      const points = getLinePoints(line);
      const m = getGridMetrics();

      const pointString = points.map(p => `${p.x},${p.y}`).join(" ");
      const last = points[points.length - 1];
      const prev = points[points.length - 2];

      const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
      const arrowSize = 10;

      const arrowP1 = {
        x: last.x - arrowSize * Math.cos(angle - Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle - Math.PI / 6)
      };

      const arrowP2 = {
        x: last.x - arrowSize * Math.cos(angle + Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle + Math.PI / 6)
      };

      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none" style="color:${color}">
          <text class="lineLabel" x="18" y="32" fill="${color}">${line.name}</text>
          <polyline points="${pointString}" stroke="${color}" />
          <polygon points="${last.x},${last.y} ${arrowP1.x},${arrowP1.y} ${arrowP2.x},${arrowP2.y}" fill="${color}" />
        </svg>
      `;

      linePreviewIndex++;
    }

    function startLinePreview() {
      stopLinePreview();

      lineOverlayVisible = true;
      linePreviewIndex = 0;
      drawSingleLinePreview();

      linePreviewTimer = setInterval(drawSingleLinePreview, 500);

      lineAutoHideTimer = setTimeout(() => {
        hideLineOverlay();
      }, 5000);
    }

    function stopLinePreview() {
      if (linePreviewTimer) {

      if (lineAutoHideTimer) {

    // =========================

    function getAvailableThemes() {

      const availableThemes = getAvailableThemes();

      if (!availableThemes.includes(activeTheme)) {

    function changeTheme(direction) {
      const availableThemes = getAvailableThemes();

      if (themeIndex >= availableThemes.length) themeIndex = 0;

}

    // =========================
    // SECTION 5: ODDS / PAYOUTS / WIN EVALUATION
    // =========================

    // =========================
    // ODDS DISPLAY
    // =========================

    function getSymbolProbabilities() {
      const counts = {};
      const total = symbolPool.length;

      symbolPool.forEach(symbol => {
        counts[symbol.name] = (counts[symbol.name] || 0) + 1;
      });

      return Object.values(counts).map(count => count / total);
    }

    function calculateOdds() {
      const probabilities = getSymbolProbabilities();
      const activeLines = getActivePaylines().length;

      let twoInRow = 0;
      let threeInRow = 0;
      let fourInRow = 0;
      let fiveInRow = 0;

      probabilities.forEach(p => {
        twoInRow += Math.pow(p, 2) * (1 - p);
        threeInRow += Math.pow(p, 3) * (1 - p);
        fourInRow += Math.pow(p, 4) * (1 - p);
        fiveInRow += Math.pow(p, 5);
      });

      const anyLineWin = twoInRow + threeInRow + fourInRow + fiveInRow;

      // Approximate only.
      // True odds are higher because of Wilds and right-to-left wins.
      const approxAnySpinWin = 1 - Math.pow(1 - anyLineWin, activeLines * 2);

      return {
        twoInRow,
        threeInRow,
        fourInRow,
        fiveInRow,
        approxAnySpinWin
      };
    }

    function formatOdds(probability) {
      if (probability <= 0) return "Never";

      const oneIn = Math.round(1 / probability).toLocaleString();
      const percent = (probability * 100).toFixed(probability < 0.001 ? 4 : 2);

      return `${percent}% / 1 in ${oneIn}`;
    }

    function updateWinInfo() {
      const winInfo = document.getElementById("winInfo");
      const activeLines = getActivePaylines().length;
      const odds = calculateOdds();

      winInfo.innerHTML = `
        <div class="winCard">
          <strong>Possibilities & Odds — ${activeLines} Lines</strong>

          <div class="winRow">
            <span>2 in row</span>
            <span>${formatOdds(odds.twoInRow)}</span>
          </div>

          <div class="winRow">
            <span>3 in row</span>
            <span>${formatOdds(odds.threeInRow)}</span>
          </div>

          <div class="winRow">
            <span>4 in row</span>
            <span>${formatOdds(odds.fourInRow)}</span>
          </div>

          <div class="winRow">
            <span>5 in row</span>
            <span>${formatOdds(odds.fiveInRow)}</span>
          </div>

          <div class="winRow winGap">
            <span>Hit Chance</span>
            <span>${formatOdds(odds.approxAnySpinWin)}</span>
          </div>
        </div>
      `;
    }

    // =========================
    // PAYOUT TABLES
    // =========================

    const payoutTables = {
      free: {
        Axe: { 2: 15, 3: 75, 4: 200, 5: 750 },
        Animal: { 2: 15, 3: 75, 4: 200, 5: 750 },
        Gem: { 2: 100, 3: 400, 4: 1250, 5: 5000 },
        default: { 2: 40, 3: 175, 4: 500, 5: 1500 }
      },

      paid: {
        Axe: { 2: 0.5, 3: 3, 4: 12, 5: 60 },
        Animal: { 2: 0.5, 3: 3, 4: 12, 5: 60 },
        Gem: { 2: 2, 3: 12, 4: 60, 5: 300 },
        default: { 2: 1, 3: 6, 4: 25, 5: 120 }
      }
    };

    function getPayoutTable(mode, symbolName) {
      const tableSet = payoutTables[mode];
      return tableSet[symbolName] || tableSet.default;
    }

    function freePayoutForMatch(matchCount, symbolName) {
      const table = getPayoutTable("free", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function paidMultiplierForMatch(matchCount, symbolName) {
      const table = getPayoutTable("paid", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function paidPayoutForMatch(matchCount, symbolName, lineBet) {
      return Math.floor(lineBet * paidMultiplierForMatch(matchCount, symbolName));
    }

    // =========================
    // GRID BUILDING
    // =========================

    function buildFinalGrid() {
      const grid = [];

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        grid[row] = [];

        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomSymbol();
        }
      }

      return grid;
    }

    // =========================
    // WIN HELPERS
    // =========================

    function isWild(symbol) {
      return symbol && symbol.name === "Wild";
    }

    function symbolsMatch(baseSymbol, testSymbol) {
      if (!baseSymbol || !testSymbol) return false;
      if (isWild(baseSymbol) || isWild(testSymbol)) return true;

      return baseSymbol.name === testSymbol.name;
    }

    function getBestBaseSymbol(symbols) {
      const nonWild = symbols.find(symbol => !isWild(symbol));

      if (nonWild) return nonWild;

      // If a line is all Wilds, pay as Gem.
      return { name: "Gem", type: "image", value: "gem.png" };
    }

    function evaluateDirection(grid, line, direction) {
      const columns = direction === "LTR"
        ? [0, 1, 2, 3, 4]
        : [4, 3, 2, 1, 0];

      const firstCol = columns[0];
      const firstRow = line.rows[firstCol];
      const firstSymbol = grid[firstRow][firstCol];

      let checkedSymbols = [firstSymbol];
      let baseSymbol = isWild(firstSymbol) ? null : firstSymbol;
      let matchCount = 1;
      let cells = [{ row: firstRow, col: firstCol }];

      for (let i = 1; i < columns.length; i++) {
        const col = columns[i];
        const row = line.rows[col];
        const symbol = grid[row][col];

        if (!baseSymbol && !isWild(symbol)) {
          baseSymbol = symbol;
        }

        const compareBase = baseSymbol || firstSymbol;

        if (symbolsMatch(compareBase, symbol)) {
          matchCount++;
          checkedSymbols.push(symbol);
          cells.push({ row, col });
        } else {
          break;
        }
      }

      if (matchCount < 2) return null;

      const payingSymbol = baseSymbol || getBestBaseSymbol(checkedSymbols);

      return {
        lineName: line.name,
        direction,
        symbol: payingSymbol.name,
        matchCount,
        cells
      };
    }

    function evaluatePaylines(grid) {
      const wins = [];
      const activePaylines = getActivePaylines();

      activePaylines.forEach(line => {
        const leftWin = evaluateDirection(grid, line, "LTR");
        const rightWin = evaluateDirection(grid, line, "RTL");

        // Prevent double-paying the same full 5-symbol line.
        if (leftWin && rightWin && leftWin.matchCount === 5 && rightWin.matchCount === 5) {
          wins.push(leftWin);
          return;
        }

        if (leftWin) wins.push(leftWin);
        if (rightWin) wins.push(rightWin);
      });

      return wins;
    }

    function checkThemeUnlocks(wins) {
      wins.forEach(win => {
        if (win.matchCount >= 5) {
          if (["Maya", "Reign", "Kyra", "Nadia"].includes(win.symbol)) {
            unlockTheme(win.symbol);
          }

          if (win.symbol === "Gem") {
            unlockTheme("Winky");
          }
        }
      });

      syncThemeIndex();
    }

    function clearWinningHighlights() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("winningCell");
        cell.classList.remove("wildCell");
      });
    }

    function highlightWins(wins) {
      wins.forEach(win => {
        win.cells.forEach(cellPosition => {
          const cell = getCell(cellPosition.row, cellPosition.col);
          cell.classList.add("winningCell");

          const img = cell.querySelector("img");

          if (img && img.alt === "Wild") {
            cell.classList.add("wildCell");
          }
        });
      });
    }

    function clearWinPopup() {
      if (winPopupTimer) {
        clearTimeout(winPopupTimer);
        winPopupTimer = null;
      }

      winPopup.classList.remove("show");
      winPopup.textContent = "";
    }

    function showWinPopup(amount) {
      if (amount <= 0) {
        clearWinPopup();
        return;
      }

      winPopup.textContent = `+${amount.toLocaleString()}`;
      winPopup.classList.add("show");

      winPopupTimer = setTimeout(() => {
        winPopup.classList.remove("show");
      }, 2500);
    }

    // =========================
    // SECTION 6: SPIN / DEV TOOLS / CODES / STATS / CLOSE
    // =========================

    // =========================
    // SPIN CONTROL
    // =========================

    function setControlsDisabled(disabled) {
      spinButton.disabled = disabled;

      document.querySelectorAll(".arrowButton").forEach(button => {
        button.disabled = disabled;
      });
    }

    function calculateSpinPayout(wins, finalBet, lineBet) {
      let payout = 0;

      if (finalBet === 0) {
        wins.forEach(win => {
          payout += freePayoutForMatch(win.matchCount, win.symbol);
        });
      } else {
        wins.forEach(win => {
          payout += paidPayoutForMatch(win.matchCount, win.symbol, lineBet);
        });
      }

      return payout;
    }

    function spin() {
      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      if (finalBet > tokens) {
        codeMessage.textContent = "Not enough Forge Tokens.";
        return;
      }

      hideLineOverlay();
      clearWinPopup();
      clearWinningHighlights();
      setControlsDisabled(true);

      if (finalBet > 0) {
        tokens -= finalBet;
        localStorage.setItem("forgeTokens", tokens);
        updateDisplay();
      }

      const finalGrid = buildFinalGrid();
      const intervals = [];

      for (let col = 0; col < COLS; col++) {
        intervals[col] = setInterval(() => {
          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            showSymbol(cell, randomSymbol());
            cell.classList.add("spinning");
          }
        }, 70);

        setTimeout(() => {
          clearInterval(intervals[col]);

          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            cell.classList.remove("spinning");
            showSymbol(cell, finalGrid[row][col]);
          }

          if (col === COLS - 1) {
            finishSpin(finalGrid, finalBet, lineBet);
          }
        }, 900 + col * 350);
      }
    }

    function finishSpin(finalGrid, finalBet, lineBet) {
      const wins = evaluatePaylines(finalGrid);
      const payout = calculateSpinPayout(wins, finalBet, lineBet);

      highlightWins(wins);
      checkThemeUnlocks(wins);

      tokens += payout;
      totalSpins += 1;

      lifetimeTokensEarned += payout;
      lifetimeTokensWagered += finalBet;

      if (payout > biggestSingleWin) {
        biggestSingleWin = payout;
      }

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      updateDisplay();
      updateStatsPanel();
      showWinPopup(payout);
      setControlsDisabled(false);
    }

    // =========================
    // QUICK SPIN DEV TOOL
    // =========================

    function quickSpin(amount) {
      markDevToolsUsed();

      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      let totalPayout = 0;
      let totalWagered = 0;
      let completedSpins = 0;

      for (let i = 0; i < amount; i++) {
        if (finalBet > tokens) break;

        if (finalBet > 0) {
          tokens -= finalBet;
          totalWagered += finalBet;
        }

        const grid = buildFinalGrid();
        const wins = evaluatePaylines(grid);
        const spinPayout = calculateSpinPayout(wins, finalBet, lineBet);

        checkThemeUnlocks(wins);

        tokens += spinPayout;
        totalPayout += spinPayout;
        totalSpins += 1;
        completedSpins += 1;

        lifetimeTokensEarned += spinPayout;
        lifetimeTokensWagered += finalBet;

        if (spinPayout > biggestSingleWin) {
          biggestSingleWin = spinPayout;
        }
      }

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      clearWinningHighlights();
      clearWinPopup();
      updateDisplay();
      updateStatsPanel();

      const net = totalPayout - totalWagered;
      const sign = net >= 0 ? "+" : "-";

      codeMessage.textContent =
        `Quick Spin: ${completedSpins} spins | Payout ${totalPayout.toLocaleString()} | Net ${sign}${Math.abs(net).toLocaleString()}`;
    }

    // =========================
    // STATISTICS / WINKY'S JUDGEMENT
    // =========================

    function saveStats() {
      if (tokens > highestBalance) {
        highestBalance = tokens;
      }

      localStorage.setItem("lifetimeTokensEarned", lifetimeTokensEarned);
      localStorage.setItem("lifetimeTokensWagered", lifetimeTokensWagered);
      localStorage.setItem("biggestSingleWin", biggestSingleWin);
      localStorage.setItem("highestBalance", highestBalance);
      localStorage.setItem("devToolsUsed", devToolsUsed ? "true" : "false");
      localStorage.setItem("promoTokensRedeemed", promoTokensRedeemed);
    }

    function markDevToolsUsed() {
      devToolsUsed = true;
      saveStats();
      updateStatsPanel();
    }

    function toggleStats() {
      statsVisible = !statsVisible;

      if (statsVisible) {
        statsPanel.classList.add("visible");
      } else {
        statsPanel.classList.remove("visible");
      }

      updateStatsPanel();
    }

    function getReturnRate() {
      if (lifetimeTokensWagered <= 0) return 0;

      return (lifetimeTokensEarned / lifetimeTokensWagered) * 100;
    }

    function getNetGain() {
      return lifetimeTokensEarned - lifetimeTokensWagered;
    }

    function getWinkyJudgement() {
      const returnRate = getReturnRate();

      if (devToolsUsed) {
        return {
          text: "Void — Winky saw the dev tools",
          className: "judgementVoid"
        };
      }

      if (tokens >= 8000000000 && totalSpins < 100) {
        return {
          text: "Void — impossible snack behavior",
          className: "judgementVoid"
        };
      }

      if (totalSpins >= 1000 && returnRate > 250) {
        return {
          text: "Suspicious — Winky is watching",
          className: "judgementSuspicious"
        };
      }

      if (totalSpins >= 5000 && returnRate > 180) {
        return {
          text: "Suspicious — unusually blessed",
          className: "judgementSuspicious"
        };
      }

      return {
        text: "Acceptable mortal",
        className: "judgementGood"
      };
    }

    function updateStatsPanel() {
      if (!statsContent) return;

      const returnRate = getReturnRate();
      const netGain = getNetGain();

      const averageEarned = totalSpins > 0
        ? Math.floor(lifetimeTokensEarned / totalSpins)
        : 0;

      const judgement = getWinkyJudgement();
      const netSign = netGain >= 0 ? "+" : "-";

      statsContent.innerHTML = `
        <div class="statRow">
          <span>Lifetime Tokens Earned</span>
          <span>${lifetimeTokensEarned.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Lifetime Tokens Wagered</span>
          <span>${lifetimeTokensWagered.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Lifetime Net Gain</span>
          <span>${netSign}${Math.abs(netGain).toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Lifetime Spins</span>
          <span>${totalSpins.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Average Earned / Spin</span>
          <span>${averageEarned.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Return Rate</span>
          <span>${returnRate.toFixed(2)}%</span>
        </div>

        <div class="statRow">
          <span>Highest Balance</span>
          <span>${highestBalance.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Biggest Win</span>
          <span>${biggestSingleWin.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Promo Tokens</span>
          <span>${promoTokensRedeemed.toLocaleString()}</span>
        </div>

        <div class="statRow">
          <span>Dev Tools Used</span>
          <span>${devToolsUsed ? "Yes" : "No"}</span>
        </div>

        <div class="statRow">
          <span>Winky’s Judgement</span>
          <span class="${judgement.className}">${judgement.text}</span>
        </div>
      `;
    }

    // =========================
    // DEV TOOLS
    // =========================

    function updateDevToolsVisibility() {
      if (devToolsUnlocked) {
        devTools.classList.add("visible");
      } else {
        devTools.classList.remove("visible");
      }
    }

    function activateThemeDev(themeName) {
      markDevToolsUsed();

      unlockTheme(themeName);
      activeTheme = themeName;
      localStorage.setItem("activeTheme", activeTheme);

      syncThemeIndex();
      symbolPool = buildSymbolPool();
      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      refreshReelGemGlow();

      codeMessage.textContent = `${themeName} theme activated.`;
    }

    function unlockAllThemes() {
      markDevToolsUsed();

      Object.keys(themes).forEach(theme => {
        unlockedThemes[theme] = true;
      });

      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      syncThemeIndex();
      updateDisplay();
      updateStatsPanel();

      codeMessage.textContent = "All themes unlocked.";
    }

    function addDevTokens() {
      markDevToolsUsed();

      tokens += 100000000000;

      localStorage.setItem("forgeTokens", tokens);

      saveStats();
      updateDisplay();
      updateStatsPanel();

      codeMessage.textContent = "+100,000,000,000 Forge Tokens added.";
    }

    // =========================
    // CODES
    // =========================

    function applyCode() {
      const code = codeInput.value.trim().toUpperCase();

      if (!code) {
        codeMessage.textContent = "Enter a code.";
        return;
      }

      const codeRewards = {
        EMAIL1000: () => {
          tokens += 1000;
          promoTokensRedeemed += 1000;

          localStorage.setItem("forgeTokens", tokens);

          saveStats();
          codeMessage.textContent = "+1,000 Forge Tokens.";
        },

        EVENT5000: () => {
          tokens += 5000;
          promoTokensRedeemed += 5000;

          localStorage.setItem("forgeTokens", tokens);

          saveStats();
          codeMessage.textContent = "+5,000 Forge Tokens.";
        },

        MAYAFOX: () => {
          unlockTheme("Maya");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Maya theme unlocked.";
        },

        REIGNBEAR: () => {
          unlockTheme("Reign");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Reign theme unlocked.";
        },

        KYRASCYTHE: () => {
          unlockTheme("Kyra");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Kyra theme unlocked.";
        },

        NADIASPELL: () => {
          unlockTheme("Nadia");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Nadia theme unlocked.";
        },

        WINKYCHAOS: () => {
          unlockTheme("Winky");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Winky theme unlocked.";
        },

        FORGEDEV: () => {
          devToolsUnlocked = true;
          localStorage.setItem("devToolsUnlocked", "true");

          markDevToolsUsed();

          codeMessage.textContent = "Dev tools unlocked.";
        }
      };

      if (codeRewards[code]) {
        codeRewards[code]();
        codeInput.value = "";

        syncThemeIndex();
        updateDisplay();
        updateDevToolsVisibility();
        updateStatsPanel();
      } else {
        codeMessage.textContent = "Invalid code.";
      }
    }

    codeInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        applyCode();
      }
    });

    // =========================
    // RESET
    // =========================

    function resetGame() {
      tokens = 0;
      totalSpins = 0;

      lifetimeTokensEarned = 0;
      lifetimeTokensWagered = 0;
      biggestSingleWin = 0;
      highestBalance = 0;
      promoTokensRedeemed = 0;
      devToolsUsed = false;

      unlockedThemes = {
        Default: true,
        Maya: false,
        Reign: false,
        Kyra: false,
        Nadia: false,
        Winky: false
      };

      activeTheme = "Default";
      themeIndex = 0;
      symbolPool = buildSymbolPool();

      devToolsUnlocked = false;
      statsVisible = false;

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      localStorage.setItem("activeTheme", activeTheme);
      localStorage.setItem("devToolsUnlocked", "false");

      saveStats();

      clearWinningHighlights();
      clearWinPopup();

      if (statsPanel) {
        statsPanel.classList.remove("visible");
      }

      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      updateDevToolsVisibility();
      updateStatsPanel();
      startLinePreview();

      codeMessage.textContent = "Game reset. Tokens, stats, and theme progress reset.";
    }

    // =========================
    // RESIZE HANDLER
    // =========================

    window.addEventListener("resize", () => {
      if (lineOverlayVisible) {
        drawSingleLinePreview();
      }
    });
  </script>
</body>
</html>
