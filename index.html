

<!-- =========================
     SECTION 1: HEAD + CSS
     ========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Spin</title>

  <style>
    :root {
      --accent: #d6a84f;
      --accent-soft: rgba(214,168,79,0.25);

      --page-bg: url("background.png");
      --game-bg: none;

      --text-main: #ffffff;
      --text-muted: #d8d0bd;
      --text-accent: var(--accent);
      --button-text: var(--accent);

      --ui-bg: rgba(0,0,0,0.54);
      --ui-bg-soft: rgba(0,0,0,0.42);
      --ui-border: 1px solid rgba(255,255,255,0.12);
      --ui-radius: 10px;
      --ui-shadow: inset 0 0 8px rgba(0,0,0,0.58);

      --button-bg: rgba(0,0,0,0.58);
      --button-border: 1px solid #7a5a22;
      --button-radius: 8px;

      --slot-bg: rgba(0,0,0,0);
      --cell-bg: rgba(0,0,0,0.1);
    }

    html {
      min-height: 100%;
      background: #050505;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 12px;
      background-color: #050505;
      background-image:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.42)),
        var(--page-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: scroll;
      overflow-x: hidden;
    }

    .pageShell {
      width: 470px;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }

    .gamePanel,
    .settingsPanel,
    .infoPanel,
    .devPanel {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      border: 2px solid var(--accent);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      box-sizing: border-box;
      box-shadow: 0 0 25px rgba(0,0,0,0.82);
    }

    .gamePanel {
      background-color: rgba(0,0,0,0.10);
      background-image:
        linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0)),
        var(--game-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      backdrop-filter: none;
      padding-bottom: 56.25%;
       /* 16:9 aspect ratio for the slot area, adjusted for padding */  
    }

    .settingsPanel,
    .infoPanel,
    .devPanel {
      margin-top: 12px;
      background: var(--ui-bg);
      border-color: var(--accent);
      box-shadow: var(--ui-shadow);
      backdrop-filter: none;
    }

    .devPanel {
      display: none;
    }

    .devPanel.visible {
      display: block;
    }

    .logoText {
      display: block;
      color: var(--text-accent);
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(0,0,0,0.85);
    }

    .logoText:hover {
      color: var(--text-accent);
      text-decoration: none;
    }

    .uiPanel,
    .specialSettings,
    .winCard,
    .statsPanel {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: var(--ui-radius);
      box-shadow: var(--ui-shadow);
    }

    .uiCell,
    .readout,
    .tokenReadout {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: 8px;
      box-shadow: var(--ui-shadow);
    }

    .uiButton,
    .arrowButton,
    .infoButton,
    .codeButton,
    .devButton,
    .resetButton {
      background: var(--button-bg);
      border: var(--button-border);
      border-radius: var(--button-radius);
      color: var(--button-text);
      cursor: pointer;
    }

    .slotFrame {
      position: relative;
      margin: 8px auto 12px;
      width: fit-content;
      height: 390px;
      overflow: hidden;
      padding: 8px;
      border-radius: 18px;
      background: var(--slot-bg);
      border: var(--ui-border);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.78);
    }

    .slotGrid {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      grid-template-rows: repeat(5, 80px);
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
      transform: translateY(-18px);
    }

    .cell {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: var(--cell-bg);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .teaserCell {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
      transform: scaleY(0.5) scaleX(0.92);
    }

    .activeCell {
      opacity: 1;
      filter: none;
    }

    .spinning {
      animation: shake 0.08s linear infinite;
      filter: none;
    }

    .teaserCell.spinning {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
    }

    .winningCell {
      border: 3px solid var(--accent);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.28),
        0 0 10px var(--accent),
        0 0 20px var(--accent),
        0 0 30px var(--accent-soft);
      animation: winPulse 0.9s ease-in-out infinite alternate;
      z-index: 3;
    }

    .wildCell {
      border: 3px solid #ffffff;
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.35),
        0 0 12px rgba(255,255,255,0.85),
        0 0 24px var(--accent),
        0 0 36px var(--accent-soft);
      animation: winPulse 0.75s ease-in-out infinite alternate;
      z-index: 3;
    }

    @keyframes winPulse {
      from { filter: brightness(1); }
      to { filter: brightness(1.28); }
    }

    @keyframes shake {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(6px); }
    }

    .lineOverlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 6;
      display: block;
      opacity: 0.95;
    }

    .lineOverlay svg {
      width: 100%;
      height: 100%;
    }

    .lineOverlay polyline {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 2px black)
        drop-shadow(0 0 3px currentColor);
      opacity: 0.65;
    }

    .lineOverlay polygon {
      filter:
        drop-shadow(0 0 2px black)
        drop-shadow(0 0 3px currentColor);
      opacity: 0.75;
    }

    .lineOverlay .lineLabel {
      font-size: 15px;
      font-weight: bold;
      filter: drop-shadow(0 0 3px black);
    }

    .winPopup,
    .unlockPopup {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.76);
      border: 1px solid var(--accent);
      color: var(--text-accent);
      font-weight: bold;
      text-shadow: 0 0 10px var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      white-space: normal;
      text-align: center;
      line-height: 1.2;
    }

    .winPopup {
      bottom: 18px;
      font-size: 24px;
      width: auto;
      max-width: 82%;
    }

    .unlockPopup {
      top: 44%;
      font-size: 20px;
      width: 82%;
      max-width: 360px;
    }

    .winPopup.show,
    .unlockPopup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .controlPanel {
      margin-top: 8px;
      padding: 6px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .controlTopRow,
    .controlBottomRow,
    .gemRow {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .controlTopRow {
      grid-template-columns: 1fr 1.4fr;
      margin-bottom: 5px;
    }

    .gemRow {
      grid-template-columns: 1fr auto 1fr;
    }

    .gemRow {
      grid-template-columns: 1fr 1fr 1.25fr;
      margin-top: 0;
      min-height: 42px;
    }

    .readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      padding: 4px 6px;
      color: var(--text-main);
    }

    .readoutLabel {
      color: var(--text-muted);
      font-size: 13px;
      min-width: 34px;
      text-align: right;
    }

    .readoutValue {
      color: var(--text-accent);
      font-size: 16px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
    }

    .tokenReadout {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 34px;
      padding: 4px 6px;
      line-height: 1.1;
      color: var(--text-accent);
      font-weight: bold;
    }

    .tokenReadout span:first-child {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: normal;
    }

    #tokenBalance {
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .arrowButton {
      width: 22px;
      height: 24px;
      padding: 0;
      margin: 0;
      font-size: 15px;
      font-weight: bold;
    }

    .spinButton {
      width: 100%;
      height: 42px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-soft);
    }

    .infoButton {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }

    .infoButton.active {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chaosGem {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chaosGem img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      pointer-events: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .chaosGem:hover img {
      transform: scale(1.08);
    }

    .gemMessage {
      min-height: 16px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      opacity: 0.95;
      color: var(--text-accent);
    }

    .gem-clear img {
      filter: brightness(1.15) saturate(0.45)
        drop-shadow(0 0 6px rgba(190,230,255,0.45));
    }

    .gem-ruby img,
    .reelGem.gem-ruby {
      filter: sepia(1) saturate(5) hue-rotate(310deg) brightness(1.15)
        drop-shadow(0 0 12px #e31b4f);
    }

    .gem-emerald img,
    .reelGem.gem-emerald {
      filter: sepia(1) saturate(4) hue-rotate(85deg) brightness(1.15)
        drop-shadow(0 0 12px #20c56b);
    }

    .gem-amethyst img,
    .reelGem.gem-amethyst {
      filter: sepia(1) saturate(4) hue-rotate(235deg) brightness(1.2)
        drop-shadow(0 0 12px #9b5de5);
    }

    .gem-sapphire img,
    .reelGem.gem-sapphire {
      filter: sepia(1) saturate(4) hue-rotate(185deg) brightness(1.15)
        drop-shadow(0 0 12px #2f6fff);
    }

    .gem-topaz img,
    .reelGem.gem-topaz {
      filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.25)
        drop-shadow(0 0 12px #f5b642);
    }

    .gem-skull {
      font-size: 31px;
      color: #d8d8d8;
      text-shadow: 0 0 14px rgba(255,255,255,0.95);
    }

    .reelGem.gem-skull {
      filter: grayscale(1) brightness(1.4)
        drop-shadow(0 0 12px #ffffff);
    }

    .specialSettings {
      text-align: left;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .specialTitle,
    .panelTitle,
    .devSectionTitle,
    .statGroupTitle,
    .winCard strong {
      color: var(--text-accent);
      font-weight: bold;
      text-align: center;
    }

    .specialTitle {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .themeSelectorRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .themeControl {
      display: grid;
      grid-template-columns: auto 24px 1fr 24px;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-top: 0;
    }

    .themeLabel {
      color: var(--text-muted);
      font-size: 12px;
      min-width: auto;
      text-align: right;
    }

    .themeValue {
      color: var(--text-accent);
      width: auto;
      min-width: 54px;
      text-align: center;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .infoButtonRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .soundButtonRow {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .lastSpin {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
      min-height: 0;
      display: none;
    }

    .statGroup {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .statGroup:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .statGroupTitle {
      margin-bottom: 5px;
      font-size: 12px;
    }

    .statRow,
    .breakdownRow,
    .unlockRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .statRow:last-child,
    .breakdownRow:last-child,
    .unlockRow:last-child {
      border-bottom: none;
    }

    .judgementGood {
      color: #39ff88;
      font-weight: bold;
    }

    .judgementSuspicious {
      color: #f5b642;
      font-weight: bold;
    }

    .judgementVoid {
      color: #ff4444;
      font-weight: bold;
    }

    .devTools {
      display: none;
    }

    .devTools.visible {
      display: none;
    }

    .devButtonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .devButton {
      color: var(--button-text);
      padding: 7px 5px;
      font-size: 11px;
    }

    .devButton:hover,
    .arrowButton:hover,
    .infoButton:hover,
    .codeButton:hover,
    .resetButton:hover {
      color: var(--text-accent);
      border-color: var(--accent);
    }

    .winInfo {
      margin: 0;
      border-top: none;
      padding-top: 0;
      text-align: left;
      font-size: 13px;
      color: var(--text-main);
    }

    .winCard {
      padding: 10px;
      line-height: 1.5;
    }

    .winCard strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .winRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 3px 0;
    }

    .winRow:last-child {
      border-bottom: none;
    }

    .winGap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .bottomStats {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    .codeArea {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .codeInput {
      background: var(--button-bg);
      color: var(--text-main);
      border: var(--ui-border);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      outline: none;
    }

    .codeInput:focus {
      border-color: var(--accent);
    }

    .codeButton {
      padding: 8px 12px;
      font-size: 13px;
    }

    .codeMessage {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 12px;
      min-height: 16px;
      text-align: center;
    }

    .resetButton {
      margin-top: 10px;
      width: 100%;
      color: var(--button-text);
      font-size: 12px;
      padding: 8px;
    }
  </style>


<!-- =========================
     SECTION 2: HTML BODY
     ========================= -->

</head>

<body>
  <div class="pageShell">

    <div class="gamePanel">
      <a class="logoText" href="https://magnettaforged.com" target="_blank" rel="noopener">
        Forge Spin
      </a>

      <div class="slotFrame">
        <div class="lineOverlay" id="lineOverlay"></div>
        <div class="slotGrid" id="slotGrid"></div>
        <div class="winPopup" id="winPopup"></div>
        <div class="unlockPopup" id="unlockPopup"></div>
      </div>

      <div class="controlPanel">
        <div class="controlTopRow">
          <div class="readout">
            <span class="readoutLabel">Lines</span>
            <button class="arrowButton" onclick="changeLineCount(-1)">‹</button>
            <span class="readoutValue" id="lineCountDisplay">15</span>
            <button class="arrowButton" onclick="changeLineCount(1)">›</button>
          </div>

          <div class="tokenReadout">
            <span>Forge Tokens</span>
            <span id="tokenBalance">0</span>
          </div>
        </div>

        <div class="controlBottomRow">
          <div class="readout">
            <span class="readoutLabel">Bet</span>
            <button class="arrowButton" onclick="changeBaseBet(-1)">‹</button>
            <span class="readoutValue" id="baseBetDisplay">Free</span>
            <button class="arrowButton" onclick="changeBaseBet(1)">›</button>
          </div>

          <div class="readout">
            <span class="readoutLabel">Multi</span>
            <button class="arrowButton" onclick="changeMultiplier(-1)">‹</button>
            <span class="readoutValue" id="multiplierDisplay">1x</span>
            <button class="arrowButton" onclick="changeMultiplier(1)">›</button>
          </div>

          <button class="spinButton" id="spinButton" onclick="spin()">FREE</button>
        </div>

        <div class="gemRow">
          <div></div>

          <div>
            <button class="chaosGem gem-clear" id="chaosGem" onclick="activateGem()" title="Chaos Gem">
              <img src="gem.png" alt="Chaos Gem">
            </button>
            <div class="gemMessage" id="gemMessage"></div>
          </div>

          <div></div>
        </div>
      </div>
    </div>

    <div class="settingsPanel">
      <div class="specialSettings">
        <div class="specialTitle">Special Settings</div>

        <div class="themeSelectorRow">
          <div class="themeControl">
            <span class="themeLabel">Character</span>
            <button class="arrowButton" onclick="changeThemeCharacter(-1)">‹</button>
            <span class="themeValue" id="themeCharacterDisplay">Default</span>
            <button class="arrowButton" onclick="changeThemeCharacter(1)">›</button>
          </div>

          <div class="themeControl">
            <span class="themeLabel">Theme</span>
            <button class="arrowButton" onclick="changeThemeVariant(-1)">‹</button>
            <span class="themeValue" id="themeVariantDisplay">Base</span>
            <button class="arrowButton" onclick="changeThemeVariant(1)">›</button>
          </div>
        </div>

        <div class="infoButtonRow">
          <button class="infoButton" id="statsButton" onclick="setInfoMode('stats')">
            Statistics
          </button>

          <button class="infoButton" id="breakdownButton" onclick="setInfoMode('breakdown')">
            Win Breakdown
          </button>
        </div>

        <div class="infoButtonRow">
          <button class="infoButton" id="notationButton" onclick="setInfoMode('notation')">
            Notation
          </button>

          <button class="infoButton" id="soundButton" onclick="toggleSound()">
            Sound: On
          </button>
        </div>

        <div class="codeArea">
          <input class="codeInput" id="codeInput" placeholder="Enter code" autocomplete="off">
          <button class="codeButton" onclick="applyCode()">Apply</button>
        </div>

        <div class="codeMessage" id="codeMessage"></div>

        <button class="resetButton" onclick="resetGame()">Reset Game</button>

        <div class="lastSpin" id="lastSpin">No spin yet.</div>

        <div class="devTools" id="devTools">
          <div id="unlockContent"></div>
        </div>
      </div>
    </div>

    <div class="infoPanel">
      <div class="winInfo" id="winInfo"></div>

      <div class="bottomStats">
        Total Spins: <span id="spinCount">0</span>
      </div>
    </div>

    <div class="devPanel" id="devPanel">
      <div id="devPanelContent"></div>
    </div>

  </div>


  <script>
    // =========================
    // SECTION 3: SETTINGS / SYMBOLS / STATE
    // =========================

    // =========================
    // CORE SETTINGS
    // =========================

    const VISIBLE_ROWS = 5;
    const COLS = 5;

    const baseBetOptions = [0n, 25n, 50n, 75n, 100n];

    const allMultiplierOptions = [
      1n,
      10n,
      50n,
      100n,
      1000n,
      2500n,
      5000n,
      10000n,
      25000n,
      50000n,
      100000n,
      1000000n,
      10000000n,
      50000000n,
      100000000n,
      500000000n,
      1000000000n,
      5000000000n,

    function formatGameNumber(amount) {
      amount = BigInt(amount);

      const units = [
        { value: 1000000000000000000000000000000000000000n, suffix: "Dd" },
        { value: 1000000000000000000000000000000000000n, suffix: "Ud" },
        { value: 1000000000000000000000000000000000n, suffix: "Dc" },
        { value: 1000000000000000000000000000000n, suffix: "No" },
        { value: 1000000000000000000000000000n, suffix: "Oc" },
        { value: 1000000000000000000000000n, suffix: "Sp" },
        { value: 1000000000000000000000n, suffix: "Sx" },
        { value: 1000000000000000000n, suffix: "Qi" },
        { value: 1000000000000000n, suffix: "Q" },
        { value: 1000000000000n, suffix: "T" },
        { value: 1000000000n, suffix: "B" }
      ];

      for (const unit of units) {
        if (amount >= unit.value) {
          const whole = amount / unit.value;
          const decimal = ((amount % unit.value) * 100n) / unit.value;

          if (whole < 1000n && decimal > 0n) {
            return `${whole}.${decimal.toString().padStart(2, "0")}${unit.suffix}`;
          }

          return `${whole.toLocaleString()}${unit.suffix}`;
        }
      }

      return amount.toLocaleString();
    }

    function formatFullNumber(amount) {
      return BigInt(amount).toLocaleString();
    }

    function formatMultiplier(amount) {
      amount = BigInt(amount);

      const units = [
        { value: 1000000000000000000n, suffix: "Qix" },
        { value: 1000000000000000n, suffix: "Qx" },
        { value: 1000000000000n, suffix: "Tx" },
        { value: 1000000000n, suffix: "Bx" },
        { value: 1000000n, suffix: "Mx" },
        { value: 1000n, suffix: "Kx" }
      ];

      for (const unit of units) {
        if (amount >= unit.value) {
          const whole = amount / unit.value;
          const decimal = ((amount % unit.value) * 10n) / unit.value;

          if (whole < 1000n && decimal > 0n) {
            return `${whole}.${decimal}${unit.suffix}`;
          }

          return `${whole.toLocaleString()}${unit.suffix}`;
        }
      }

      return amount.toLocaleString() + "x";
    }

    function formatPercent(numerator, denominator) {
      numerator = BigInt(numerator);
      denominator = BigInt(denominator);

      if (denominator <= 0n) return "0.00";

      const scaled = (numerator * 10000n) / denominator;
      const whole = scaled / 100n;
      const decimal = scaled % 100n;

      return `${whole.toLocaleString()}.${decimal.toString().padStart(2, "0")}`;
    }

    function getGridMetrics() {

      const pitch = cellSize + gap;

      return {
        viewW: 456,
        viewH: 390,
        cellSize: cellSize,
        gap: gap,
        pitch: pitch,
        gridTop: -10,
        gridLeft: 8
      };

    function getLinePoints(line) {
      const m = getGridMetrics();

      const rowMap = {
        1: m.gridTop + m.pitch * 1 + m.cellSize / 2,
        2: m.gridTop + m.pitch * 2 + m.cellSize / 2,
        3: m.gridTop + m.pitch * 3 + m.cellSize / 2
      };

      const colX = col => m.gridLeft + m.pitch * col + m.cellSize / 2;

      return line.rows.map((row, col) => ({
        x: colX(col),
        y: rowMap[row]
      }));
    }

    function drawSingleLinePreview() {
      if (!lineOverlayVisible) return;

      const activeLines = getActivePaylines();
      if (activeLines.length === 0) return;

      const line = activeLines[linePreviewIndex % activeLines.length];
      const color = lineColors[linePreviewIndex % lineColors.length];
      const points = getLinePoints(line);
      const m = getGridMetrics();

      const pointString = points.map(p => `${p.x},${p.y}`).join(" ");
      const last = points[points.length - 1];
      const prev = points[points.length - 2];

      const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
      const arrowSize = 10;

      const arrowP1 = {
        x: last.x - arrowSize * Math.cos(angle - Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle - Math.PI / 6)
      };

      const arrowP2 = {
        x: last.x - arrowSize * Math.cos(angle + Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle + Math.PI / 6)
      };

      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none" style="color:${color}">
          <text class="lineLabel" x="18" y="32" fill="${color}">${line.name}</text>
          <polyline points="${pointString}" stroke="${color}" />
          <polygon points="${last.x},${last.y} ${arrowP1.x},${arrowP1.y} ${arrowP2.x},${arrowP2.y}" fill="${color}" />
        </svg>
      `;

      linePreviewIndex++;
    }

    function drawWinningLines(wins) {
      if (!wins.length) {
        hideLineOverlay();
        return;
      }

      stopLinePreview();

      const m = getGridMetrics();

      const lineSvgs = wins.map((win, index) => {
        const color = lineColors[index % lineColors.length];
        const line = paylines.find(payline => payline.name === win.lineName);

        if (!line) return "";

        const points = getLinePoints(line);
        const pointString = points.map(p => `${p.x},${p.y}`).join(" ");

        return `<polyline points="${pointString}" stroke="${color}" />`;
      }).join("");

      lineOverlayVisible = true;
      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none">
          ${lineSvgs}
        </svg>
      `;
    }

    function startLinePreview() {
      stopLinePreview();

      lineOverlayVisible = true;
      linePreviewIndex = 0;
      drawSingleLinePreview();

      linePreviewTimer = setInterval(drawSingleLinePreview, 500);

      lineAutoHideTimer = setTimeout(() => {
        hideLineOverlay();
      }, 5000);
    }

    function stopLinePreview() {
      if (linePreviewTimer) {
        clearInterval(linePreviewTimer);
        linePreviewTimer = null;
      }

      if (lineAutoHideTimer) {
        clearTimeout(lineAutoHideTimer);
        lineAutoHideTimer = null;
      }
    }

    function hideLineOverlay() {
      stopLinePreview();
      lineOverlayVisible = false;
      lineOverlay.style.display = "none";
      lineOverlay.innerHTML = "";
    }

    // =========================
    // THEME LOGIC
    // =========================

    function getAvailableThemes() {
      return Object.keys(themes).filter(theme => unlockedThemes[theme]);
    }

    function getAvailableThemeCharacters() {
      return themeCharacterGroups.filter(group => {
        const groupThemes = themeGroupMap[group] || [];
        return groupThemes.some(themeKey => unlockedThemes[themeKey]);
      });
    }

    function getUnlockedThemesForCharacter(characterName) {
      const groupThemes = themeGroupMap[characterName] || [];
      return groupThemes.filter(themeKey => unlockedThemes[themeKey] && themes[themeKey]);
    }

    function syncThemeIndex() {
      const availableThemes = getAvailableThemes();

      if (!availableThemes.includes(activeTheme)) {
        activeTheme = "Default";
        localStorage.setItem("activeTheme", activeTheme);
      }

      themeIndex = availableThemes.indexOf(activeTheme);
    }

    function syncThemeSelectors() {
      const activeGroup = themes[activeTheme]?.characterGroup || "Default";
      const availableCharacters = getAvailableThemeCharacters();

      themeCharacterIndex = availableCharacters.indexOf(activeGroup);
      if (themeCharacterIndex < 0) themeCharacterIndex = 0;

      const characterName = availableCharacters[themeCharacterIndex] || "Default";
      const unlockedGroupThemes = getUnlockedThemesForCharacter(characterName);

      themeVariantIndex = unlockedGroupThemes.indexOf(activeTheme);
      if (themeVariantIndex < 0) themeVariantIndex = 0;
    }

    function changeThemeCharacter(direction) {
      playSound("click");

      const availableCharacters = getAvailableThemeCharacters();
      if (!availableCharacters.length) return;

      themeCharacterIndex += direction;

      if (themeCharacterIndex < 0) themeCharacterIndex = availableCharacters.length - 1;
      if (themeCharacterIndex >= availableCharacters.length) themeCharacterIndex = 0;

      const characterName = availableCharacters[themeCharacterIndex];
      const unlockedGroupThemes = getUnlockedThemesForCharacter(characterName);

      themeVariantIndex = 0;
      activeTheme = unlockedGroupThemes[0] || "Default";

      localStorage.setItem("activeTheme", activeTheme);

      symbolPool = buildSymbolPool();
      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      refreshReelGemGlow();
    }

    function changeThemeVariant(direction) {
      playSound("click");

      const availableCharacters = getAvailableThemeCharacters();
      const characterName = availableCharacters[themeCharacterIndex] || "Default";
      const unlockedGroupThemes = getUnlockedThemesForCharacter(characterName);

      if (!unlockedGroupThemes.length) return;

      themeVariantIndex += direction;

      if (themeVariantIndex < 0) themeVariantIndex = unlockedGroupThemes.length - 1;
      if (themeVariantIndex >= unlockedGroupThemes.length) themeVariantIndex = 0;

      activeTheme = unlockedGroupThemes[themeVariantIndex];

      localStorage.setItem("activeTheme", activeTheme);

      symbolPool = buildSymbolPool();
      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      refreshReelGemGlow();
    }

    function changeTheme(direction) {
      changeThemeCharacter(direction);
    }

    function unlockTheme(themeName) {
      if (!themes[themeName]) return false;

      if (!unlockedThemes[themeName]) {
        unlockedThemes[themeName] = true;
        localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
        return true;
      }

      return false;
    }

    function applyTheme(themeName) {
      const theme = themes[themeName] || themes.Default;

      lineColors = theme.lineColors || defaultLineColors;

      document.documentElement.style.setProperty("--accent", theme.accent);
      document.documentElement.style.setProperty("--accent-soft", theme.accent + "40");
      document.documentElement.style.setProperty("--page-bg", theme.pageImage || 'url("background.png")');
      document.documentElement.style.setProperty("--game-bg", theme.gameImage || "none");

      document.documentElement.style.setProperty("--text-main", theme.textMain || "#ffffff");
      document.documentElement.style.setProperty("--text-muted", theme.textMuted || "#c9c9c9");
      document.documentElement.style.setProperty("--text-accent", theme.textAccent || theme.accent);
      document.documentElement.style.setProperty("--button-text", theme.buttonText || theme.accent);
    }

    function applyUnlockedTheme(themeName) {
      if (!themes[themeName]) return;

      activeTheme = themeName;
      localStorage.setItem("activeTheme", activeTheme);

      syncThemeIndex();
      syncThemeSelectors();

      symbolPool = buildSymbolPool();
      applyTheme(activeTheme);

      updateDisplay();
      refreshReelGemGlow();
    }

    function getUnlockGemKey() {
      if (!gemActive || currentGem === "clear") return "diamond";
      return currentGem;
    }

    function handleCharacterThemeUnlock(characterName) {
      unlockTheme(characterName);

      const gemKey = getUnlockGemKey();

      let themeToApply = characterName;

      if (gemKey !== "diamond") {
        const variantTheme = `${characterName}${capitalize(gemKey)}`;

        if (themes[variantTheme]) {
          unlockTheme(variantTheme);
          themeToApply = variantTheme;
        }
      }

      applyUnlockedTheme(themeToApply);

      const themeLabel = themes[themeToApply]?.label || themeToApply;
      showUnlockPopup(`${themeLabel} Unlocked`);

      playSound("unlock");
    }

    function showUnlockPopup(message) {

      if (unlockPopupTimer) {
        clearTimeout(unlockPopupTimer);
        unlockPopupTimer = null;

      unlockPopup.innerHTML = message;
      unlockPopup.classList.add("show");

      unlockPopupTimer = setTimeout(() => {
        unlockPopup.classList.remove("show");

    // GEM LOGIC
    // =========================

    function setGemImage(gem) {
      gem.innerHTML = '<img src="gem.png" alt="Chaos Gem">';
    }

    function getGemGlowClass() {
      if (!gemActive || currentGem === "clear") return "";
      return `gem-${currentGem}`;
    }

    function refreshReelGemGlow() {
      document.querySelectorAll(".reelGem").forEach(img => {
        img.classList.remove(
          "gem-ruby",
          "gem-emerald",
          "gem-amethyst",
          "gem-sapphire",
          "gem-topaz",
          "gem-skull"
        );

        const glowClass = getGemGlowClass();

        if (glowClass) {
          img.classList.add(glowClass);
        }
      });

    function activateGem() {
      playSound("click");

      const gem = document.getElementById("chaosGem");
      const message = document.getElementById("gemMessage");

      if (gemActive) {
        gemActive = false;
        currentGem = "clear";

        gem.className = "chaosGem gem-clear";
        setGemImage(gem);

        message.textContent = "";
        message.style.color = "";

        refreshReelGemGlow();
        return;
      }

      gemActive = true;

      const roll = Math.random() * 100;
      let outcome;

      if (roll < 19.2) {
        outcome = { name: "ruby", className: "gem-ruby", color: "#e31b4f" };
      } else if (roll < 38.4) {
        outcome = { name: "emerald", className: "gem-emerald", color: "#20c56b" };
      } else if (roll < 57.6) {
        outcome = { name: "amethyst", className: "gem-amethyst", color: "#9b5de5" };
      } else if (roll < 76.8) {
        outcome = { name: "sapphire", className: "gem-sapphire", color: "#2f6fff" };
      } else if (roll < 96) {
        outcome = { name: "topaz", className: "gem-topaz", color: "#f5b642" };
      } else {
        outcome = { name: "skull", className: "gem-skull", color: "#d8d8d8" };
      }

      currentGem = outcome.name;
      gem.className = `chaosGem ${outcome.className}`;

      if (outcome.name === "skull") {
        gem.textContent = "☠";
        message.textContent = "Stay awhile and Listen";
        unlockTheme("Winky");
        syncThemeSelectors();
        updateUnlockPanel();
        playSound("winky");
      } else {
        setGemImage(gem);
        message.textContent = `${capitalize(outcome.name)} Gem Active`;
      }

      message.style.color = outcome.color;
      refreshReelGemGlow();
    }

      }

      if (multiplierIndex < 0) {

    // =========================
    // SECTION 5: ODDS / PAYOUTS / WIN EVALUATION
    // =========================

    // =========================
    // ODDS DISPLAY
    // =========================

    function getSymbolProbabilities() {
      const counts = {};
      const total = symbolPool.length;

      symbolPool.forEach(symbol => {
        counts[symbol.name] = (counts[symbol.name] || 0) + 1;
      });

      return Object.values(counts).map(count => count / total);
    }

    function calculateOdds() {
      const probabilities = getSymbolProbabilities();
      const activeLines = getActivePaylines().length;

      let twoInRow = 0;
      let threeInRow = 0;
      let fourInRow = 0;
      let fiveInRow = 0;

      probabilities.forEach(p => {
        twoInRow += Math.pow(p, 2) * (1 - p);
        threeInRow += Math.pow(p, 3) * (1 - p);
        fourInRow += Math.pow(p, 4) * (1 - p);
        fiveInRow += Math.pow(p, 5);
      });

      const anyLineWin = twoInRow + threeInRow + fourInRow + fiveInRow;

      // Approximate only. True odds are higher because of Wilds and right-to-left wins.
      const approxAnySpinWin = 1 - Math.pow(1 - anyLineWin, activeLines * 2);

      return {
        twoInRow,
        threeInRow,
        fourInRow,
        fiveInRow,
        approxAnySpinWin
      };
    }

    function formatOdds(probability) {
      if (probability <= 0) return "Never";

      const oneIn = Math.round(1 / probability).toLocaleString();
      const percent = (probability * 100).toFixed(probability < 0.001 ? 4 : 2);

      return `${percent}% / 1 in ${oneIn}`;
    }

    // =========================
    // BIGINT PAYOUT TABLES
    // Paid payout multipliers are scaled by 100.
    // Example: 75n = 0.75x, 150n = 1.5x, 14000n = 140x.
    // =========================

    const PAYOUT_SCALE = 100n;

    const payoutTables = {
      free: {
        Axe: { 2: 15n, 3: 75n, 4: 200n, 5: 750n },
        Animal: { 2: 15n, 3: 75n, 4: 200n, 5: 750n },
        Gem: { 2: 100n, 3: 400n, 4: 1250n, 5: 5000n },
        Wild: { 2: 100n, 3: 400n, 4: 1250n, 5: 5000n },
        default: { 2: 40n, 3: 175n, 4: 500n, 5: 1500n }
      },

      paid: {
        Axe: { 2: 50n, 3: 300n, 4: 1400n, 5: 7000n },
        Animal: { 2: 50n, 3: 300n, 4: 1400n, 5: 7000n },
        Gem: { 2: 200n, 3: 1200n, 4: 7000n, 5: 32500n },
        Wild: { 2: 200n, 3: 1200n, 4: 7000n, 5: 32500n },
        default: { 2: 100n, 3: 600n, 4: 3200n, 5: 14000n }
      }
    };

    function getPayoutTable(mode, symbolName) {
      const tableSet = payoutTables[mode];
      return tableSet[symbolName] || tableSet.default;
    }

    function freePayoutForMatch(matchCount, symbolName) {
      const table = getPayoutTable("free", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0n;
    }

    function paidMultiplierForMatch(matchCount, symbolName) {
      const table = getPayoutTable("paid", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0n;
    }

    function paidPayoutForMatch(matchCount, symbolName, lineBet) {
      const scaledMultiplier = paidMultiplierForMatch(matchCount, symbolName);
      return (lineBet * scaledMultiplier) / PAYOUT_SCALE;
    }

    function payoutForWin(win, finalBet, lineBet) {
      if (finalBet === 0n) {
        return freePayoutForMatch(win.matchCount, win.symbol);
      }

      return paidPayoutForMatch(win.matchCount, win.symbol, lineBet);
    }

    // =========================
    // GRID BUILDING
    // =========================

    function buildFinalGrid() {
      const grid = [];

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        grid[row] = [];

        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomSymbol();
        }
      }

      return grid;
    }

    // =========================
    // WIN HELPERS
    // =========================

    function isWild(symbol) {
      return symbol && symbol.name === "Wild";
    }

    function symbolsMatch(baseSymbol, testSymbol) {
      if (!baseSymbol || !testSymbol) return false;
      if (isWild(baseSymbol) || isWild(testSymbol)) return true;

      return baseSymbol.name === testSymbol.name;
    }

    function getBestBaseSymbol(symbols) {
      const nonWild = symbols.find(symbol => !isWild(symbol));

      if (nonWild) return nonWild;

      // Pure Wild line pays as Wild.
      return { name: "Wild", type: "image", value: "wild.png" };
    }

    function countLeadingWilds(symbols) {
      let count = 0;

      for (let i = 0; i < symbols.length; i++) {
        if (isWild(symbols[i])) {
          count++;
        } else {
          break;
        }
      }

      return count;
    }

    function isPureWildChain(symbols) {
      return symbols.length >= 2 && symbols.every(symbol => isWild(symbol));
    }

    function evaluateDirection(grid, line, direction) {
      const columns = direction === "LTR"
        ? [0, 1, 2, 3, 4]
        : [4, 3, 2, 1, 0];

      const firstCol = columns[0];
      const firstRow = line.rows[firstCol];
      const firstSymbol = grid[firstRow][firstCol];

      let checkedSymbols = [firstSymbol];
      let baseSymbol = isWild(firstSymbol) ? null : firstSymbol;
      let matchCount = 1;
      let cells = [{ row: firstRow, col: firstCol }];

      for (let i = 1; i < columns.length; i++) {
        const col = columns[i];
        const row = line.rows[col];
        const symbol = grid[row][col];

        if (!baseSymbol && !isWild(symbol)) {
          baseSymbol = symbol;
        }

        const compareBase = baseSymbol || firstSymbol;

        if (symbolsMatch(compareBase, symbol)) {
          matchCount++;
          checkedSymbols.push(symbol);
          cells.push({ row, col });
        } else {
          break;
        }
      }

      if (matchCount < 2) return null;

      const payingSymbol = baseSymbol || getBestBaseSymbol(checkedSymbols);
      const pureWild = isPureWildChain(checkedSymbols);
      const leadingWildCount = countLeadingWilds(checkedSymbols);

      return {
        lineName: line.name,
        direction,
        symbol: payingSymbol.name,
        matchCount,
        wildCount: leadingWildCount,
        cells,
        pureWild
      };
    }

    function evaluatePaylines(grid) {
      const wins = [];
      const activePaylines = getActivePaylines();

      activePaylines.forEach(line => {
        const leftWin = evaluateDirection(grid, line, "LTR");
        const rightWin = evaluateDirection(grid, line, "RTL");

        // Prevent double-paying the same full 5-symbol line.
        if (leftWin && rightWin && leftWin.matchCount === 5 && rightWin.matchCount === 5) {
          wins.push(leftWin);
          return;
        }

        if (leftWin) wins.push(leftWin);
        if (rightWin) wins.push(rightWin);
      });

      return wins;
    }

    function countBonusSpinsFromWins(wins) {
      let earned = 0;

      wins.forEach(win => {
        if (win.wildCount >= 2) {
          earned += win.wildCount;
        }
      });

      return earned;
    }

    function checkThemeUnlocks(wins) {
      let unlockedSomething = false;

      wins.forEach(win => {
        if (win.matchCount < 5) return;

        if (characterSymbols.includes(win.symbol)) {
          handleCharacterThemeUnlock(win.symbol);
          unlockedSomething = true;
        }

        if (win.symbol === "Gem" || win.symbol === "Wild") {
          const wasUnlocked = unlockTheme("Winky");

          if (wasUnlocked) {
            applyUnlockedTheme("Winky");
            showUnlockPopup("Winky Unlocked");
            playSound("unlock");
            unlockedSomething = true;
          }
        }
      });

      if (unlockedSomething) {
        localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
        updateUnlockPanel();
      }

      syncThemeIndex();
    }

    function clearWinningHighlights() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("winningCell");
        cell.classList.remove("wildCell");
      });
    }

    function highlightWins(wins) {
      wins.forEach(win => {
        win.cells.forEach(cellPosition => {
          const cell = getCell(cellPosition.row, cellPosition.col);
          cell.classList.add("winningCell");

          const img = cell.querySelector("img");

          if (img && img.alt === "Wild") {
            cell.classList.add("wildCell");
          }
        });
      });
    }

    function buildWinBreakdown(wins, finalBet, lineBet) {
      if (!wins.length) return [];

      return wins.map(win => {
        const payout = payoutForWin(win, finalBet, lineBet);

        const wildText = win.wildCount >= 2
          ? ` — Wild x${win.wildCount}`
          : "";

        const bonusText = finalBet > 0n && win.wildCount >= 2
          ? ` + ${win.wildCount} Bonus Spins`
          : "";

        return {
          text: `${win.lineName} ${win.direction}: ${win.matchCount}x ${win.symbol}${wildText}${bonusText}`,
          payout
        };
      });
    }

    function clearWinPopup() {
      if (winPopupTimer) {
        clearTimeout(winPopupTimer);
        winPopupTimer = null;
      }

      winPopup.classList.remove("show");
      winPopup.textContent = "";
    }

    function showWinPopup(amount) {
      amount = BigInt(amount);

      if (amount <= 0n) {
        clearWinPopup();
        return;
      }

      winPopup.textContent = `+${formatGameNumber(amount)}`;
      winPopup.classList.add("show");

      winPopupTimer = setTimeout(() => {
        winPopup.classList.remove("show");
      }, 2500);
    }


    // =========================
    // SECTION 6: SPIN / DEV TOOLS / CODES / STATS / CLOSE
    // =========================

    // =========================
    // SPIN CONTROL
    // =========================

    function setControlsDisabled(disabled) {
      spinButton.disabled = disabled;

      document.querySelectorAll(".arrowButton").forEach(button => {
        button.disabled = disabled;
      });

      document.querySelectorAll(".infoButton").forEach(button => {
        button.disabled = disabled;
      });
    }

    function calculateSpinPayout(wins, finalBet, lineBet) {
      let payout = 0n;

      wins.forEach(win => {
        payout += payoutForWin(win, finalBet, lineBet);
      });

      return payout;
    }

    function spin() {
      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      if (finalBet > tokens) {
        codeMessage.textContent = "Not enough Forge Tokens.";
        playSound("click");
        return;
      }

      if (finalBet > 0n) {
        tokens -= finalBet;
        saveBigInt("forgeTokens", tokens);
        updateDisplay();
      }

      animateSpin(finalBet, lineBet, "normal");
    }

    function animateSpin(finalBet, lineBet, spinType = "normal") {
      playSound("spin");
      hideLineOverlay();
      clearWinPopup();
      clearWinningHighlights();
      setControlsDisabled(true);

      if (spinType === "bonus") {
        const currentBonusNumber = bonusSessionPlayed + 1;
        showUnlockPopup(`Bonus Spin ${currentBonusNumber} / ${bonusSessionTotal}`);
      }

      const finalGrid = buildFinalGrid();
      const intervals = [];

      for (let col = 0; col < COLS; col++) {
        intervals[col] = setInterval(() => {
          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            showSymbol(cell, randomSymbol());
            cell.classList.add("spinning");
          }
        }, 70);

        setTimeout(() => {
          clearInterval(intervals[col]);
          playSound("stop");

          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            cell.classList.remove("spinning");
            showSymbol(cell, finalGrid[row][col]);
          }

          if (col === COLS - 1) {
            finishSpin(finalGrid, finalBet, lineBet, spinType);
          }
        }, 900 + col * 350);
      }
    }

    function finishSpin(finalGrid, finalBet, lineBet, spinType = "normal") {
      const wins = evaluatePaylines(finalGrid);
      const payout = calculateSpinPayout(wins, finalBet, lineBet);

      const earnedBonusSpins = spinType === "normal" && finalBet > 0n
        ? countBonusSpinsFromWins(wins)
        : 0;

      highlightWins(wins);
      drawWinningLines(wins);
      checkThemeUnlocks(wins);

      lastWinBreakdown = buildWinBreakdown(wins, finalBet, lineBet);

      tokens += payout;
      totalSpins += 1;
      lifetimeTokensEarned += payout;

      checkMultiplierUnlocks();

      if (spinType === "normal") {
        lifetimeTokensWagered += finalBet;

        if (finalBet === 0n) {
          lifetimeFreeGames += 1;
          lifetimeFreeWinnings += payout;
        } else {
          lifetimePaidGames += 1;
          lifetimePaidWagered += finalBet;
          lifetimePaidWinnings += payout;
        }
      }

      if (spinType === "bonus") {
        lifetimeBonusSpinsPlayed += 1;
        lifetimeBonusSpinWinnings += payout;
        bonusSessionPlayed += 1;
        bonusSessionWon += payout;
      }

      if (earnedBonusSpins > 0) {
        bonusSpinQueue += earnedBonusSpins;
        bonusSpinLineBet = lineBet;
        bonusSpinFinalBet = finalBet;
        bonusSpinSource = `${earnedBonusSpins} Bonus Spins`;

        bonusSessionTotal = earnedBonusSpins;
        bonusSessionPlayed = 0;
        bonusSessionWon = 0n;

        lifetimeBonusSpinsEarned += earnedBonusSpins;
        showUnlockPopup(`${earnedBonusSpins} Bonus Spins Earned`);
        playSound("bonus");
      }

      if (payout > biggestSingleWin) {
        biggestSingleWin = payout;
      }

      saveBigInt("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      updateDisplay();
      showWinPopup(payout);

      if (payout > 0n) {
        if (finalBet > 0n && payout >= finalBet * 20n) {
          playSound("bigWin");
        } else {
          playSound("smallWin");
        }
      }

      if (bonusSpinQueue > 0) {
        setTimeout(runBonusSpin, BONUS_SPIN_DELAY);
      } else {
        if (spinType === "bonus" && bonusSessionTotal > 0) {
          showUnlockPopup(`Bonus Tokens Won<br>${formatGameNumber(bonusSessionWon)}`);
          bonusSessionTotal = 0;
          bonusSessionPlayed = 0;
          bonusSessionWon = 0n;
        }

        setControlsDisabled(false);
      }
    }

    function runBonusSpin() {
      if (bonusSpinQueue <= 0) {
        setControlsDisabled(false);
        return;
      }

      bonusSpinQueue -= 1;
      animateSpin(bonusSpinFinalBet, bonusSpinLineBet, "bonus");
    }

    // =========================

    // =========================

    function checkMultiplierUnlocks() {
      const availableMultipliers = getUnlockedMultiplierOptions();
      const nextMultiplier = allMultiplierOptions[availableMultipliers.length];

      if (!nextMultiplier) return;

      const threshold = getMultiplierUnlockThreshold(nextMultiplier);

      if (tokens >= threshold) {
        unlockedMultiplierMax = nextMultiplier;
        saveBigInt("unlockedMultiplierMax", unlockedMultiplierMax);

        showUnlockPopup(
          `New Multiplier Unlocked<br>${formatMultiplier(nextMultiplier)}<br><small>Use this power carefully.<br>Continue to forge on.</small>`
        );

        updateDisplay();
      }
    }

    // =========================

    function quickSpin(amount) {
      markDevToolsUsed();
      playSound("click");

      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      let totalPayout = 0n;
      let totalWagered = 0n;
      let completedSpins = 0;
      let earnedBonusTotal = 0;
      let playedBonusTotal = 0;

      for (let i = 0; i < amount; i++) {
        if (finalBet > tokens) break;

        if (finalBet > 0n) {
          tokens -= finalBet;
          totalWagered += finalBet;
        }

        const grid = buildFinalGrid();
        const wins = evaluatePaylines(grid);
        const spinPayout = calculateSpinPayout(wins, finalBet, lineBet);
        const earnedBonusSpins = finalBet > 0n ? countBonusSpinsFromWins(wins) : 0;

        checkThemeUnlocks(wins);

        tokens += spinPayout;
        checkMultiplierUnlocks();

        totalPayout += spinPayout;
        totalSpins += 1;
        completedSpins += 1;

        lifetimeTokensEarned += spinPayout;
        lifetimeTokensWagered += finalBet;

        if (finalBet === 0n) {
          lifetimeFreeGames += 1;
          lifetimeFreeWinnings += spinPayout;
        } else {
          lifetimePaidGames += 1;
          lifetimePaidWagered += finalBet;
          lifetimePaidWinnings += spinPayout;
        }

        if (earnedBonusSpins > 0) {
          lifetimeBonusSpinsEarned += earnedBonusSpins;
          earnedBonusTotal += earnedBonusSpins;

          for (let b = 0; b < earnedBonusSpins; b++) {
            const bonusGrid = buildFinalGrid();
            const bonusWins = evaluatePaylines(bonusGrid);
            const bonusPayout = calculateSpinPayout(bonusWins, finalBet, lineBet);

            checkThemeUnlocks(bonusWins);

            tokens += bonusPayout;
            checkMultiplierUnlocks();

            totalPayout += bonusPayout;
            totalSpins += 1;

            lifetimeTokensEarned += bonusPayout;
            lifetimeBonusSpinsPlayed += 1;
            lifetimeBonusSpinWinnings += bonusPayout;
            playedBonusTotal += 1;

            if (bonusPayout > biggestSingleWin) {
              biggestSingleWin = bonusPayout;
            }
          }
        }

        if (spinPayout > biggestSingleWin) {
          biggestSingleWin = spinPayout;
        }
      }

      saveBigInt("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      clearWinningHighlights();
      clearWinPopup();
      hideLineOverlay();
      updateDisplay();

      const net = totalPayout - totalWagered;
      const sign = net >= 0n ? "+" : "-";
      const absNet = net >= 0n ? net : -net;

      codeMessage.textContent =
        `Quick Spin: ${completedSpins} spins | Bonus ${playedBonusTotal}/${earnedBonusTotal} | Net ${sign}${formatGameNumber(absNet)}`;
    }

      if (lifetimePaidWagered <= 0n) return false;
      return lifetimePaidWinnings * 100n > lifetimePaidWagered * BigInt(percent);

      if (lifetimePaidGames >= 1000 && paidReturnGreaterThan(250)) {

          tokens += 1000n;
          promoTokensRedeemed += 1000n;
          saveBigInt("forgeTokens", tokens);
          saveStats();
          codeMessage.textContent = "+1,000 Forge Tokens.";
        },

          promoTokensRedeemed += 5000n;

        },

          codeMessage.textContent = "Nadia theme unlocked.";
        },

        },

          localStorage.setItem("devToolsUnlocked", "true");

          updateDevToolsVisibility();

        syncThemeIndex();
        syncThemeSelectors();
        updateDisplay();
        updateDevToolsVisibility();
      } else {
        codeMessage.textContent = "Invalid code.";

    // RESET
    // =========================

    function resetGame() {
      playSound("click");

      tokens = 0n;
      totalSpins = 0;

      lifetimeTokensEarned = 0n;
      lifetimeTokensWagered = 0n;
      biggestSingleWin = 0n;
      highestBalance = 0n;
      promoTokensRedeemed = 0n;
      devToolsUsed = false;

      lifetimeFreeGames = 0;
      lifetimeFreeWinnings = 0n;

      lifetimePaidGames = 0;
      lifetimePaidWagered = 0n;
      lifetimePaidWinnings = 0n;

      lifetimeBonusSpinsEarned = 0;
      lifetimeBonusSpinsPlayed = 0;
      lifetimeBonusSpinWinnings = 0n;

      unlockedMultiplierMax = STARTING_MULTIPLIER_MAX;

      bonusSpinQueue = 0;
      bonusSpinLineBet = 0n;
      bonusSpinFinalBet = 0n;
      bonusSpinSource = "";

      bonusSessionTotal = 0;
      bonusSessionPlayed = 0;
      bonusSessionWon = 0n;
      devUnlockInfoVisible = false;

      unlockedThemes = {};
      Object.keys(themes).forEach(themeKey => {
        unlockedThemes[themeKey] = themeKey === "Default";
      });

      activeTheme = "Default";
      themeIndex = 0;
      themeCharacterIndex = 0;
      themeVariantIndex = 0;
      symbolPool = buildSymbolPool();

      devToolsUnlocked = false;
      activePanel = null;
      lastWinBreakdown = [];

      saveBigInt("forgeTokens", tokens);
      saveBigInt("unlockedMultiplierMax", unlockedMultiplierMax);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      localStorage.setItem("activeTheme", activeTheme);
      localStorage.setItem("devToolsUnlocked", "false");

      saveStats();

      clearWinningHighlights();
      clearWinPopup();
      hideLineOverlay();

      syncThemeIndex();
      syncThemeSelectors();
      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      updateDevToolsVisibility();
      startLinePreview();

      codeMessage.textContent = "Game reset. Tokens, stats, and theme progress reset.";
    }

    // =========================
    // RESIZE HANDLER
    // =========================

    window.addEventListener("resize", () => {
      if (lineOverlayVisible) {
        drawSingleLinePreview();
      }
    });
  </script>
</body>
</html>
