<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Spin</title>

  <style>
    :root {
      --accent: #d6a84f;
      --accent-soft: rgba(214,168,79,0.25);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.20), rgba(0,0,0,0.45)),
        url("background.png") center center / cover no-repeat fixed;
    }

    .game {
      width: 500px;
      background: rgba(15,15,15,0.84);
      border: 2px solid var(--accent);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      backdrop-filter: blur(3px);
    }

    .logoText {
      color: var(--accent);
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .slotFrame {
      position: relative;
      margin: 8px auto 12px;
      width: fit-content;
      height: 390px;
      overflow: hidden;
      padding: 8px;
      border-radius: 18px;
      background: #0f0f0f;
      border: 1px solid #333;
      box-shadow: inset 0 0 18px #000;
    }

    .slotGrid {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      grid-template-rows: repeat(5, 80px);
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
      transform: translateY(-18px);
    }

    .cell {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .teaserCell {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
      transform: scaleY(0.5) scaleX(0.92);
    }

    .activeCell {
      opacity: 1;
      filter: none;
    }

    .spinning {
      animation: shake 0.08s linear infinite;
      filter: none;
    }

    .teaserCell.spinning {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
    }

    .winningCell {
      border: 2px solid var(--accent);
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.8),
        0 0 16px var(--accent),
        0 0 28px var(--accent-soft);
    }

    @keyframes shake {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(6px); }
    }

    .lineOverlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      display: block;
      opacity: 0.95;
    }

    .lineOverlay svg {
      width: 100%;
      height: 100%;
    }

    .lineOverlay polyline {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px currentColor);
      opacity: 0.85;
    }

    .lineOverlay polygon {
      filter: drop-shadow(0 0 4px currentColor);
      opacity: 0.95;
    }

    .lineOverlay .lineLabel {
      font-size: 15px;
      font-weight: bold;
      filter: drop-shadow(0 0 3px black);
    }

    .winPopup {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 6;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .winPopup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .controlPanel {
      margin-top: 8px;
      padding: 6px 4px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .controlTopRow,
    .controlBottomRow,
    .gemRow {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .controlTopRow {
      grid-template-columns: 1fr 1.4fr;
      margin-bottom: 5px;
    }

    .controlBottomRow {
      grid-template-columns: 1fr 1fr 1.25fr;
    }

    .gemRow {
      grid-template-columns: 1fr 1fr 1.25fr;
      margin-top: 0;
      min-height: 42px;
    }

    .readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 28px;
      color: #ddd;
    }

    .readoutLabel {
      color: #aaa;
      font-size: 13px;
      min-width: 34px;
      text-align: right;
    }

    .readoutValue {
      color: var(--accent);
      font-size: 16px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
    }

    .tokenReadout {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-height: 32px;
      color: var(--accent);
      font-size: 17px;
      font-weight: bold;
    }

    .tokenReadout span:first-child {
      color: #aaa;
      font-size: 13px;
      font-weight: normal;
    }

    .arrowButton {
      width: 22px;
      height: 24px;
      padding: 0;
      margin: 0;
      border-radius: 7px;
      border: 1px solid #7a5a22;
      background: rgba(37,37,37,0.72);
      color: var(--accent);
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .spinButton {
      width: 100%;
      height: 42px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chaosGem {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chaosGem img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      pointer-events: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .chaosGem:hover img {
      transform: scale(1.08);
    }

    .gemMessage {
      min-height: 16px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      opacity: 0.95;
    }

    .gem-clear img {
      filter: brightness(1.15) saturate(0.45)
        drop-shadow(0 0 6px rgba(190,230,255,0.45));
    }

    .gem-ruby img,
    .reelGem.gem-ruby {
      filter: sepia(1) saturate(5) hue-rotate(310deg) brightness(1.15)
        drop-shadow(0 0 12px #e31b4f);
    }

    .gem-emerald img,
    .reelGem.gem-emerald {
      filter: sepia(1) saturate(4) hue-rotate(85deg) brightness(1.15)
        drop-shadow(0 0 12px #20c56b);
    }

    .gem-amethyst img,
    .reelGem.gem-amethyst {
      filter: sepia(1) saturate(4) hue-rotate(235deg) brightness(1.2)
        drop-shadow(0 0 12px #9b5de5);
    }

    .gem-sapphire img,
    .reelGem.gem-sapphire {
      filter: sepia(1) saturate(4) hue-rotate(185deg) brightness(1.15)
        drop-shadow(0 0 12px #2f6fff);
    }

    .gem-topaz img,
    .reelGem.gem-topaz {
      filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.25)
        drop-shadow(0 0 12px #f5b642);
    }

    .gem-skull {
      font-size: 31px;
      color: #d8d8d8;
      text-shadow: 0 0 14px rgba(255,255,255,0.95);
    }

    .reelGem.gem-skull {
      filter: grayscale(1) brightness(1.4)
        drop-shadow(0 0 12px #ffffff);
    }

    .specialSettings {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      text-align: left;
    }

    .specialTitle {
      color: var(--accent);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
    }

    .themeControl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .themeValue {
      color: var(--accent);
      min-width: 80px;
      text-align: center;
      font-weight: bold;
    }

    .lastSpin {
      margin-top: 8px;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
      min-height: 20px;
    }

    .devTools {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .devTools.visible {
      display: block;
    }

    .devSectionTitle {
      color: var(--accent);
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      margin: 8px 0 6px;
    }

    .devButtonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .devButton {
      background: #202020;
      border: 1px solid rgba(255,255,255,0.12);
      color: #ddd;
      border-radius: 8px;
      padding: 7px 5px;
      font-size: 11px;
      cursor: pointer;
    }

    .devButton:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .winInfo {
      margin-top: 12px;
      border-top: 1px solid #333;
      padding-top: 10px;
      text-align: left;
      font-size: 13px;
      color: #ddd;
    }

    .winCard {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px;
      line-height: 1.5;
    }

    .winCard strong {
      display: block;
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 14px;
      text-align: center;
    }

    .winRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 3px 0;
    }

    .winRow:last-child {
      border-bottom: none;
    }

    .winGap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .bottomStats {
      margin-top: 12px;
      color: #777;
      font-size: 13px;
    }

    .codeArea {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .codeInput {
      background: #151515;
      color: #ddd;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      outline: none;
    }

    .codeInput:focus {
      border-color: var(--accent);
    }

    .codeButton {
      background: #252525;
      color: var(--accent);
      border: 1px solid #7a5a22;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .codeMessage {
      margin-top: 6px;
      color: #888;
      font-size: 12px;
      min-height: 16px;
    }

    .resetButton {
      margin-top: 10px;
      width: 100%;
      background: #222;
      color: #777;
      border: 1px solid #333;
      font-size: 12px;
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
    }

    .resetButton:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    @media (max-width: 600px) {
      .game {
        width: 94vw;
        padding: 10px;
      }

      .slotGrid {
        grid-template-columns: repeat(5, 64px);
        grid-template-rows: repeat(5, 64px);
        gap: 8px;
        transform: translateY(-14px);
      }

      .cell {
        width: 64px;
        height: 64px;
        font-size: 30px;
      }

      .slotFrame {
        height: 310px;
      }

      .controlTopRow,
      .controlBottomRow,
      .gemRow {
        grid-template-columns: 1fr;
      }

      .tokenReadout {
        justify-content: center;
      }

      .spinButton {
        height: 46px;
      }

      .winPopup {
        font-size: 20px;
        bottom: 16px;
      }

      .devButtonGrid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="game">
    <div class="logoText">Forge Spin</div>

    <div class="slotFrame">
      <div class="lineOverlay" id="lineOverlay"></div>
      <div class="slotGrid" id="slotGrid"></div>
      <div class="winPopup" id="winPopup"></div>
    </div>

    <div class="controlPanel">
      <div class="controlTopRow">
        <div class="readout">
          <span class="readoutLabel">Lines</span>
          <button class="arrowButton" onclick="changeLineCount(-1)">‹</button>
          <span class="readoutValue" id="lineCountDisplay">15</span>
          <button class="arrowButton" onclick="changeLineCount(1)">›</button>
        </div>

        <div class="tokenReadout">
          <span>Forge Tokens</span>
          <span id="tokenBalance">0</span>
        </div>
      </div>

      <div class="controlBottomRow">
        <div class="readout">
          <span class="readoutLabel">Bet</span>
          <button class="arrowButton" onclick="changeBaseBet(-1)">‹</button>
          <span class="readoutValue" id="baseBetDisplay">Free</span>
          <button class="arrowButton" onclick="changeBaseBet(1)">›</button>
        </div>

        <div class="readout">
          <span class="readoutLabel">Multi</span>
          <button class="arrowButton" onclick="changeMultiplier(-1)">‹</button>
          <span class="readoutValue" id="multiplierDisplay">1x</span>
          <button class="arrowButton" onclick="changeMultiplier(1)">›</button>
        </div>

        <button class="spinButton" id="spinButton" onclick="spin()">FREE</button>
      </div>

      <div class="gemRow">
        <div></div>

        <div>
          <button class="chaosGem gem-clear" id="chaosGem" onclick="activateGem()" title="Chaos Gem">
            <img src="gem.png" alt="Chaos Gem">
          </button>
          <div class="gemMessage" id="gemMessage"></div>
        </div>

        <div></div>
      </div>
    </div>

    <div class="specialSettings">
      <div class="specialTitle">Special Settings</div>

      <div class="themeControl">
        <button class="arrowButton" onclick="changeTheme(-1)">‹</button>
        <span>Theme</span>
        <span class="themeValue" id="themeDisplay">Default</span>
        <button class="arrowButton" onclick="changeTheme(1)">›</button>
      </div>

      <div class="lastSpin" id="lastSpin">No spin yet.</div>

      <div class="devTools" id="devTools">
        <div class="devSectionTitle">Theme Tools</div>
        <div class="devButtonGrid">
          <button class="devButton" onclick="unlockAllThemes()">Unlock All</button>
          <button class="devButton" onclick="activateThemeDev('Maya')">Activate Maya</button>
          <button class="devButton" onclick="activateThemeDev('Reign')">Activate Reign</button>
          <button class="devButton" onclick="activateThemeDev('Kyra')">Activate Kyra</button>
          <button class="devButton" onclick="activateThemeDev('Nadia')">Activate Nadia</button>
          <button class="devButton" onclick="activateThemeDev('Winky')">Activate Winky</button>
        </div>

        <div class="devSectionTitle">Token Tools</div>
        <div class="devButtonGrid">
          <button class="devButton" onclick="addDevTokens()">+1,000,000 Tokens</button>
        </div>
      </div>
    </div>

    <div class="winInfo" id="winInfo"></div>

    <div class="bottomStats">
      Total Spins: <span id="spinCount">0</span>
    </div>

    <div class="codeArea">
      <input class="codeInput" id="codeInput" placeholder="Enter code" autocomplete="off">
      <button class="codeButton" onclick="applyCode()">Apply</button>
    </div>
    <div class="codeMessage" id="codeMessage"></div>

    <button class="resetButton" onclick="resetGame()">Reset Game</button>
  </div>

  <script>
    const VISIBLE_ROWS = 5;
    const COLS = 5;

    const baseBetOptions = [0, 10, 50, 75, 100];
    const multiplierOptions = [1, 10, 50, 100, 1000, 2500, 5000, 10000];
    const lineCountOptions = [5, 10, 15];

    const lineColors = [
      "#f0c35a", "#55d6ff", "#ff4fd8", "#60ff7a", "#ff7a32",
      "#ffffff", "#a855ff", "#00ffd5", "#ff4444", "#99ff33",
      "#ffd166", "#4cc9f0", "#f72585", "#80ffdb", "#f8961e"
    ];

    const themes = {
      Default: { accent: "#d6a84f", image: "background.png" },
      Maya: { accent: "#8fdcff", image: "mayatheme.png" },
      Reign: { accent: "#c46a35", image: "reigntheme.png" },
      Kyra: { accent: "#9b5de5", image: "kyratheme.png" },
      Nadia: { accent: "#d6a84f", image: "nadiatheme.png" },
      Winky: { accent: "#39ff88", image: "winkytheme.png" }
    };

    let unlockedThemes = JSON.parse(localStorage.getItem("unlockedThemes")) || {
      Default: true,
      Maya: false,
      Reign: false,
      Kyra: false,
      Nadia: false,
      Winky: false
    };

    let devToolsUnlocked = localStorage.getItem("devToolsUnlocked") === "true";

    let activeTheme = localStorage.getItem("activeTheme") || "Default";
    let themeIndex = 0;

    let baseBetIndex = 0;
    let multiplierIndex = 0;
    let lineCountIndex = 2;

    let gemActive = false;
    let currentGem = "clear";

    let lineOverlayVisible = true;
    let linePreviewIndex = 0;
    let linePreviewTimer = null;
    let lineAutoHideTimer = null;
    let winPopupTimer = null;

    const symbolPool = [
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },

      { name: "Maya", type: "image", value: "maya.png" },
      { name: "Maya", type: "image", value: "maya.png" },
      { name: "Maya", type: "image", value: "maya.png" },

      { name: "Reign", type: "image", value: "reign.png" },
      { name: "Reign", type: "image", value: "reign.png" },
      { name: "Reign", type: "image", value: "reign.png" },

      { name: "Kyra", type: "image", value: "kyra.png" },
      { name: "Kyra", type: "image", value: "kyra.png" },
      { name: "Kyra", type: "image", value: "kyra.png" },

      { name: "Nadia", type: "image", value: "nadia.png" },
      { name: "Nadia", type: "image", value: "nadia.png" },
      { name: "Nadia", type: "image", value: "nadia.png" },

      { name: "Gem", type: "image", value: "gem.png" },
      { name: "Gem", type: "image", value: "gem.png" }
    ];

    const paylines = [
      { name: "Line 1", rows: [2, 2, 2, 2, 2] },
      { name: "Line 2", rows: [1, 1, 1, 1, 1] },
      { name: "Line 3", rows: [3, 3, 3, 3, 3] },
      { name: "Line 4", rows: [1, 2, 3, 2, 1] },
      { name: "Line 5", rows: [3, 2, 1, 2, 3] },

      { name: "Line 6", rows: [2, 1, 1, 1, 2] },
      { name: "Line 7", rows: [2, 3, 3, 3, 2] },
      { name: "Line 8", rows: [1, 1, 2, 3, 3] },
      { name: "Line 9", rows: [3, 3, 2, 1, 1] },
      { name: "Line 10", rows: [1, 2, 2, 2, 3] },

      { name: "Line 11", rows: [3, 2, 2, 2, 1] },
      { name: "Line 12", rows: [1, 2, 1, 2, 1] },
      { name: "Line 13", rows: [3, 2, 3, 2, 3] },
      { name: "Line 14", rows: [2, 1, 2, 1, 2] },
      { name: "Line 15", rows: [2, 3, 2, 3, 2] }
    ];

    let tokens = Number(localStorage.getItem("forgeTokens"));
    if (isNaN(tokens)) {
      tokens = 0;
      localStorage.setItem("forgeTokens", tokens);
    }

    let totalSpins = Number(localStorage.getItem("forgeTotalSpins")) || 0;

    const tokenBalance = document.getElementById("tokenBalance");
    const spinCount = document.getElementById("spinCount");
    const baseBetDisplay = document.getElementById("baseBetDisplay");
    const multiplierDisplay = document.getElementById("multiplierDisplay");
    const lineCountDisplay = document.getElementById("lineCountDisplay");
    const themeDisplay = document.getElementById("themeDisplay");
    const slotGrid = document.getElementById("slotGrid");
    const lineOverlay = document.getElementById("lineOverlay");
    const winPopup = document.getElementById("winPopup");
    const lastSpin = document.getElementById("lastSpin");
    const spinButton = document.getElementById("spinButton");
    const devTools = document.getElementById("devTools");
    const codeInput = document.getElementById("codeInput");
    const codeMessage = document.getElementById("codeMessage");

    createGrid();
    syncThemeIndex();
    applyTheme(activeTheme);
    updateDisplay();
    updateDevToolsVisibility();
    startLinePreview();

    function getLineCount() {
      return lineCountOptions[lineCountIndex];
    }

    function getActivePaylines() {
      return paylines.slice(0, getLineCount());
    }

    function changeLineCount(direction) {
      lineCountIndex += direction;

      if (lineCountIndex < 0) lineCountIndex = lineCountOptions.length - 1;
      if (lineCountIndex >= lineCountOptions.length) lineCountIndex = 0;

      updateDisplay();
      startLinePreview();
    }

    function getGridMetrics() {
      const mobile = window.innerWidth <= 600;
      const cellSize = mobile ? 64 : 80;
      const gap = 8;
      const pitch = cellSize + gap;
      const gridTop = mobile ? -10 : -10;
      const gridLeft = 8;

      return {
        viewW: mobile ? 370 : 456,
        viewH: mobile ? 310 : 390,
        cellSize,
        gap,
        pitch,
        gridTop,
        gridLeft
      };
    }

    function getLinePoints(line) {
      const m = getGridMetrics();

      const rowMap = {
        1: m.gridTop + m.pitch * 1 + m.cellSize / 2,
        2: m.gridTop + m.pitch * 2 + m.cellSize / 2,
        3: m.gridTop + m.pitch * 3 + m.cellSize / 2
      };

      const colX = col => m.gridLeft + m.pitch * col + m.cellSize / 2;

      return line.rows.map((row, col) => ({
        x: colX(col),
        y: rowMap[row]
      }));
    }

    function drawSingleLinePreview() {
      if (!lineOverlayVisible) return;

      const activeLines = getActivePaylines();
      if (activeLines.length === 0) return;

      const line = activeLines[linePreviewIndex % activeLines.length];
      const color = lineColors[linePreviewIndex % lineColors.length];
      const points = getLinePoints(line);
      const m = getGridMetrics();

      const pointString = points.map(p => `${p.x},${p.y}`).join(" ");
      const last = points[points.length - 1];
      const prev = points[points.length - 2];

      const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
      const arrowSize = 10;

      const arrowP1 = {
        x: last.x - arrowSize * Math.cos(angle - Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle - Math.PI / 6)
      };

      const arrowP2 = {
        x: last.x - arrowSize * Math.cos(angle + Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle + Math.PI / 6)
      };

      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none" style="color:${color}">
          <text class="lineLabel" x="18" y="32" fill="${color}">${line.name}</text>
          <polyline points="${pointString}" stroke="${color}" />
          <polygon points="${last.x},${last.y} ${arrowP1.x},${arrowP1.y} ${arrowP2.x},${arrowP2.y}" fill="${color}" />
        </svg>
      `;

      linePreviewIndex++;
    }

    function startLinePreview() {
      stopLinePreview();

      lineOverlayVisible = true;
      linePreviewIndex = 0;
      drawSingleLinePreview();

      linePreviewTimer = setInterval(drawSingleLinePreview, 500);

      lineAutoHideTimer = setTimeout(() => {
        hideLineOverlay();
      }, 5000);
    }

    function stopLinePreview() {
      if (linePreviewTimer) {
        clearInterval(linePreviewTimer);
        linePreviewTimer = null;
      }

      if (lineAutoHideTimer) {
        clearTimeout(lineAutoHideTimer);
        lineAutoHideTimer = null;
      }
    }

    function hideLineOverlay() {
      stopLinePreview();
      lineOverlayVisible = false;
      lineOverlay.style.display = "none";
    }

    function getAvailableThemes() {
      return Object.keys(themes).filter(theme => unlockedThemes[theme]);
    }

    function syncThemeIndex() {
      const availableThemes = getAvailableThemes();

      if (!availableThemes.includes(activeTheme)) {
        activeTheme = "Default";
      }

      themeIndex = availableThemes.indexOf(activeTheme);
    }

    function changeTheme(direction) {
      const availableThemes = getAvailableThemes();

      themeIndex += direction;

      if (themeIndex < 0) themeIndex = availableThemes.length - 1;
      if (themeIndex >= availableThemes.length) themeIndex = 0;

      activeTheme = availableThemes[themeIndex];
      localStorage.setItem("activeTheme", activeTheme);

      applyTheme(activeTheme);
      updateDisplay();
    }

    function unlockTheme(themeName) {
      if (!themes[themeName]) return;

      if (!unlockedThemes[themeName]) {
        unlockedThemes[themeName] = true;
        localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      }
    }

    function activateThemeDev(themeName) {
      unlockTheme(themeName);
      activeTheme = themeName;
      localStorage.setItem("activeTheme", activeTheme);

      syncThemeIndex();
      applyTheme(activeTheme);
      updateDisplay();

      lastSpin.textContent = `${themeName} theme activated.`;
    }

    function unlockAllThemes() {
      Object.keys(themes).forEach(theme => {
        unlockedThemes[theme] = true;
      });

      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      syncThemeIndex();
      updateDisplay();

      lastSpin.textContent = "All themes unlocked.";
    }

    function addDevTokens() {
      tokens += 1000000;
      localStorage.setItem("forgeTokens", tokens);
      updateDisplay();

      lastSpin.textContent = "+1,000,000 Forge Tokens added.";
    }

    function applyTheme(themeName) {
      const theme = themes[themeName] || themes.Default;

      document.documentElement.style.setProperty("--accent", theme.accent);
      document.documentElement.style.setProperty("--accent-soft", theme.accent + "40");

      document.body.style.background = `
        linear-gradient(rgba(0,0,0,0.20), rgba(0,0,0,0.45)),
        url("${theme.image}") center center / cover no-repeat fixed
      `;

      document.querySelector(".slotFrame").style.background = "#0f0f0f";
    }

    function setGemImage(gem) {
      gem.innerHTML = '<img src="gem.png" alt="Chaos Gem">';
    }

    function getGemGlowClass() {
      if (!gemActive || currentGem === "clear") return "";
      return `gem-${currentGem}`;
    }

    function refreshReelGemGlow() {
      document.querySelectorAll(".reelGem").forEach(img => {
        img.classList.remove(
          "gem-ruby",
          "gem-emerald",
          "gem-amethyst",
          "gem-sapphire",
          "gem-topaz",
          "gem-skull"
        );

        const glowClass = getGemGlowClass();

        if (glowClass) {
          img.classList.add(glowClass);
        }
      });
    }

    function activateGem() {
      const gem = document.getElementById("chaosGem");
      const message = document.getElementById("gemMessage");

      if (gemActive) {
        gemActive = false;
        currentGem = "clear";

        gem.className = "chaosGem gem-clear";
        setGemImage(gem);

        message.textContent = "";
        message.style.color = "";

        refreshReelGemGlow();
        return;
      }

      gemActive = true;

      const roll = Math.random() * 100;
      let outcome;

      if (roll < 19.2) {
        outcome = { name: "ruby", className: "gem-ruby", color: "#e31b4f" };
      } else if (roll < 38.4) {
        outcome = { name: "emerald", className: "gem-emerald", color: "#20c56b" };
      } else if (roll < 57.6) {
        outcome = { name: "amethyst", className: "gem-amethyst", color: "#9b5de5" };
      } else if (roll < 76.8) {
        outcome = { name: "sapphire", className: "gem-sapphire", color: "#2f6fff" };
      } else if (roll < 96) {
        outcome = { name: "topaz", className: "gem-topaz", color: "#f5b642" };
      } else {
        outcome = { name: "skull", className: "gem-skull", color: "#d8d8d8" };
      }

      currentGem = outcome.name;
      gem.className = `chaosGem ${outcome.className}`;

      if (outcome.name === "skull") {
        gem.textContent = "☠";
        message.textContent = "Stay awhile and Listen";
        unlockTheme("Winky");
      } else {
        setGemImage(gem);
        message.textContent = "Gem Activated";
      }

      message.style.color = outcome.color;
      refreshReelGemGlow();
    }

    function randomSymbol() {
      return symbolPool[Math.floor(Math.random() * symbolPool.length)];
    }

    function showSymbol(cell, symbol) {
      cell.innerHTML = "";

      if (symbol.type === "image") {
        const img = document.createElement("img");
        img.src = symbol.value;
        img.alt = symbol.name;

        if (symbol.name === "Gem") {
          img.classList.add("reelGem");

          const glowClass = getGemGlowClass();
          if (glowClass) {
            img.classList.add(glowClass);
          }
        }

        cell.appendChild(img);
      } else {
        cell.textContent = symbol.value;
      }
    }

    function createGrid() {
      slotGrid.innerHTML = "";

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const cell = document.createElement("div");
          const isTeaserRow = row === 0 || row === 4;

          cell.className = isTeaserRow ? "cell teaserCell" : "cell activeCell";
          cell.id = `cell-${row}-${col}`;

          showSymbol(cell, randomSymbol());
          slotGrid.appendChild(cell);
        }
      }
    }

    function getCell(row, col) {
      return document.getElementById(`cell-${row}-${col}`);
    }

    function changeBaseBet(direction) {
      baseBetIndex += direction;
      if (baseBetIndex < 0) baseBetIndex = baseBetOptions.length - 1;
      if (baseBetIndex >= baseBetOptions.length) baseBetIndex = 0;
      updateDisplay();
    }

    function changeMultiplier(direction) {
      multiplierIndex += direction;
      if (multiplierIndex < 0) multiplierIndex = multiplierOptions.length - 1;
      if (multiplierIndex >= multiplierOptions.length) multiplierIndex = 0;
      updateDisplay();
    }

    function getBaseBet() {
      return baseBetOptions[baseBetIndex];
    }

    function getMultiplier() {
      return multiplierOptions[multiplierIndex];
    }

    function getFinalBet() {
      const baseBet = getBaseBet();
      const multiplier = getMultiplier();
      if (baseBet === 0) return 0;
      return baseBet * multiplier;
    }

    function getLineBet() {
      const finalBet = getFinalBet();
      const activeLines = getActivePaylines().length;

      if (finalBet === 0) return 0;

      return Math.floor(finalBet / activeLines);
    }

    function updateDisplay() {
      const baseBet = getBaseBet();
      const multiplier = getMultiplier();
      const finalBet = getFinalBet();

      tokenBalance.textContent = tokens.toLocaleString();
      spinCount.textContent = totalSpins.toLocaleString();

      baseBetDisplay.textContent = baseBet === 0 ? "Free" : baseBet.toLocaleString();
      multiplierDisplay.textContent = multiplier + "x";
      lineCountDisplay.textContent = getLineCount();
      themeDisplay.textContent = activeTheme;

      spinButton.textContent = finalBet === 0
        ? "FREE"
        : finalBet.toLocaleString();

      updateWinInfo();
      updateDevToolsVisibility();
    }

    function getSymbolProbabilities() {
      const counts = {};
      const total = symbolPool.length;

      symbolPool.forEach(symbol => {
        counts[symbol.name] = (counts[symbol.name] || 0) + 1;
      });

      return Object.values(counts).map(count => count / total);
    }

    function calculateOdds() {
      const probabilities = getSymbolProbabilities();
      const activeLines = getActivePaylines().length;

      let twoInRow = 0;
      let threeInRow = 0;
      let fourInRow = 0;
      let fiveInRow = 0;

      probabilities.forEach(p => {
        twoInRow += Math.pow(p, 2) * (1 - p);
        threeInRow += Math.pow(p, 3) * (1 - p);
        fourInRow += Math.pow(p, 4) * (1 - p);
        fiveInRow += Math.pow(p, 5);
      });

      const anyLineWin = twoInRow + threeInRow + fourInRow + fiveInRow;
      const approxAnySpinWin = 1 - Math.pow(1 - anyLineWin, activeLines);

      return {
        twoInRow,
        threeInRow,
        fourInRow,
        fiveInRow,
        approxAnySpinWin
      };
    }

    function formatOdds(probability) {
      if (probability <= 0) return "Never";

      const oneIn = Math.round(1 / probability).toLocaleString();
      const percent = (probability * 100).toFixed(probability < 0.001 ? 4 : 2);

      return `${percent}% / 1 in ${oneIn}`;
    }

    function updateWinInfo() {
      const winInfo = document.getElementById("winInfo");
      const activeLines = getActivePaylines().length;
      const odds = calculateOdds();

      winInfo.innerHTML = `
        <div class="winCard">
          <strong>Possibilities & Odds — ${activeLines} Lines</strong>

          <div class="winRow">
            <span>2 in row</span>
            <span>${formatOdds(odds.twoInRow)}</span>
          </div>

          <div class="winRow">
            <span>3 in row</span>
            <span>${formatOdds(odds.threeInRow)}</span>
          </div>

          <div class="winRow">
            <span>4 in row</span>
            <span>${formatOdds(odds.fourInRow)}</span>
          </div>

          <div class="winRow">
            <span>5 in row</span>
            <span>${formatOdds(odds.fiveInRow)}</span>
          </div>

          <div class="winRow winGap">
            <span>Hit Chance</span>
            <span>${formatOdds(odds.approxAnySpinWin)}</span>
          </div>
        </div>
      `;
    }

    function paidMultiplierForMatch(matchCount, symbolName) {
      const paytables = {
        Axe: { 2: 1.5, 3: 8, 4: 36, 5: 150 },
        Gem: { 2: 6, 3: 30, 4: 150, 5: 800 },
        default: { 2: 3, 3: 14, 4: 70, 5: 300 }
      };

      const table = paytables[symbolName] || paytables.default;

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function paidPayoutForMatch(matchCount, symbolName, lineBet) {
      return Math.floor(lineBet * paidMultiplierForMatch(matchCount, symbolName));
    }

    function freePayoutForMatch(matchCount, symbolName) {
      const paytables = {
        Axe: { 2: 15, 3: 75, 4: 200, 5: 750 },
        Gem: { 2: 100, 3: 400, 4: 1250, 5: 5000 },
        default: { 2: 40, 3: 175, 4: 500, 5: 1500 }
      };

      const table = paytables[symbolName] || paytables.default;

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function buildFinalGrid() {
      const grid = [];

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        grid[row] = [];

        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomSymbol();
        }
      }

      return grid;
    }

    function clearWinningHighlights() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("winningCell");
      });
    }

    function clearWinPopup() {
      if (winPopupTimer) {
        clearTimeout(winPopupTimer);
        winPopupTimer = null;
      }

      winPopup.classList.remove("show");
      winPopup.textContent = "";
    }

    function showWinPopup(amount) {
      if (amount <= 0) {
        clearWinPopup();
        return;
      }

      winPopup.textContent = `+${amount.toLocaleString()}`;
      winPopup.classList.add("show");

      winPopupTimer = setTimeout(() => {
        winPopup.classList.remove("show");
      }, 2500);
    }

    function evaluatePaylines(grid) {
      const wins = [];
      const activePaylines = getActivePaylines();

      activePaylines.forEach((line) => {
        const firstSymbol = grid[line.rows[0]][0];
        let matchCount = 1;

        for (let col = 1; col < COLS; col++) {
          const row = line.rows[col];
          const symbol = grid[row][col];

          if (symbol.name === firstSymbol.name) {
            matchCount++;
          } else {
            break;
          }
        }

        if (matchCount >= 2) {
          wins.push({
            lineName: line.name,
            symbol: firstSymbol.name,
            matchCount,
            cells: line.rows.slice(0, matchCount).map((row, col) => ({ row, col }))
          });
        }
      });

      return wins;
    }

    function checkThemeUnlocks(wins) {
      wins.forEach(win => {
        if (win.matchCount >= 5) {
          if (["Maya", "Reign", "Kyra", "Nadia"].includes(win.symbol)) {
            unlockTheme(win.symbol);
          }

          if (win.symbol === "Gem") {
            unlockTheme("Winky");
          }
        }
      });

      syncThemeIndex();
    }

    function highlightWins(wins) {
      wins.forEach(win => {
        win.cells.forEach(cellPosition => {
          getCell(cellPosition.row, cellPosition.col).classList.add("winningCell");
        });
      });
    }

    function setControlsDisabled(disabled) {
      spinButton.disabled = disabled;

      document.querySelectorAll(".arrowButton").forEach(button => {
        button.disabled = disabled;
      });
    }

    function spin() {
      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      if (finalBet > tokens) {
        lastSpin.textContent = "Not enough Forge Tokens.";
        return;
      }

      hideLineOverlay();
      clearWinPopup();
      setControlsDisabled(true);
      clearWinningHighlights();
      lastSpin.textContent = "Spinning...";

      if (finalBet > 0) {
        tokens -= finalBet;
        localStorage.setItem("forgeTokens", tokens);
        updateDisplay();
      }

      const finalGrid = buildFinalGrid();
      const intervals = [];

      for (let col = 0; col < COLS; col++) {
        intervals[col] = setInterval(() => {
          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            showSymbol(cell, randomSymbol());
            cell.classList.add("spinning");
          }
        }, 70);

        setTimeout(() => {
          clearInterval(intervals[col]);

          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            cell.classList.remove("spinning");
            showSymbol(cell, finalGrid[row][col]);
          }

          if (col === COLS - 1) {
            finishSpin(finalGrid, finalBet, lineBet);
          }
        }, 900 + col * 350);
      }
    }

    function finishSpin(finalGrid, finalBet, lineBet) {
      const wins = evaluatePaylines(finalGrid);
      let payout = 0;
      let message = "";

      highlightWins(wins);
      checkThemeUnlocks(wins);

      if (finalBet === 0) {
        wins.forEach(win => {
          payout += freePayoutForMatch(win.matchCount, win.symbol);
        });
      } else {
        wins.forEach(win => {
          payout += paidPayoutForMatch(win.matchCount, win.symbol, lineBet);
        });
      }

      if (wins.length === 0) {
        message = "No win.";
      } else {
        message = `${wins.length} winning line${wins.length > 1 ? "s" : ""}.`;
      }

      tokens += payout;
      totalSpins += 1;

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      updateDisplay();
      lastSpin.textContent = message;
      showWinPopup(payout);
      setControlsDisabled(false);
    }

    function updateDevToolsVisibility() {
      if (devToolsUnlocked) {
        devTools.classList.add("visible");
      } else {
        devTools.classList.remove("visible");
      }
    }

    function applyCode() {
      const code = codeInput.value.trim().toUpperCase();

      if (!code) {
        codeMessage.textContent = "Enter a code.";
        return;
      }

      const codeRewards = {
        EMAIL1000: () => {
          tokens += 1000;
          localStorage.setItem("forgeTokens", tokens);
          codeMessage.textContent = "+1,000 Forge Tokens.";
        },
        EVENT5000: () => {
          tokens += 5000;
          localStorage.setItem("forgeTokens", tokens);
          codeMessage.textContent = "+5,000 Forge Tokens.";
        },
        MAYAFOX: () => {
          unlockTheme("Maya");
          codeMessage.textContent = "Maya theme unlocked.";
        },
        REIGNBEAR: () => {
          unlockTheme("Reign");
          codeMessage.textContent = "Reign theme unlocked.";
        },
        KYRASCYTHE: () => {
          unlockTheme("Kyra");
          codeMessage.textContent = "Kyra theme unlocked.";
        },
        NADIASPELL: () => {
          unlockTheme("Nadia");
          codeMessage.textContent = "Nadia theme unlocked.";
        },
        WINKYCHAOS: () => {
          unlockTheme("Winky");
          codeMessage.textContent = "Winky theme unlocked.";
        },
        FORGEDEV: () => {
          devToolsUnlocked = true;
          localStorage.setItem("devToolsUnlocked", "true");
          codeMessage.textContent = "Dev tools unlocked.";
        }
      };

      if (codeRewards[code]) {
        codeRewards[code]();
        codeInput.value = "";
        syncThemeIndex();
        updateDisplay();
        updateDevToolsVisibility();
      } else {
        codeMessage.textContent = "Invalid code.";
      }
    }

    codeInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        applyCode();
      }
    });

    function resetGame() {
      tokens = 0;
      totalSpins = 0;

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);

      clearWinningHighlights();
      clearWinPopup();
      updateDisplay();

      startLinePreview();

      lastSpin.textContent = "Game reset. Tokens and spins set to 0.";
    }

    window.addEventListener("resize", () => {
      if (lineOverlayVisible) {
        drawSingleLinePreview();
      }
    });
  </script>
</body>
</html>
