<!-- =========================
     SECTION 1: HEAD + CSS
     ========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagnettaForged Slots</title>

  <style>
    :root {
      --accent: #d6a84f;
      --accent-soft: rgba(214,168,79,0.25);

      --page-bg: url("background.png");
      --game-bg: none;

      --text-main: #ffffff;
      --text-muted: #d8d0bd;
      --text-accent: var(--accent);
      --button-text: var(--accent);

      --ui-bg: rgba(0,0,0,0.54);
      --ui-bg-soft: rgba(0,0,0,0.42);
      --ui-border: 1px solid rgba(255,255,255,0.12);
      --ui-radius: 10px;
      --ui-shadow: inset 0 0 8px rgba(0,0,0,0.58);

      --button-bg: rgba(0,0,0,0.58);
      --button-border: 1px solid #7a5a22;
      --button-radius: 8px;

      --slot-bg: rgba(0,0,0,0);
      --cell-bg: rgba(0,0,0,0.1);
    }

    html {
      min-height: 100%;
      background: #050505;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 12px;
      background-color: #050505;
      background-image:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.42)),
        var(--page-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: scroll;
      overflow-x: hidden;
    }

    .game {
      width: 570px;
      margin-left: auto;
      margin-right: auto;
      background-color: rgba(0,0,0,0.10);
      background-image:
        linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0)),
        var(--game-bg);
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      border: 2px solid var(--accent);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.82);
      backdrop-filter: none;
    }

    .logoText {
      display: block;
      color: var(--text-accent);
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(0,0,0,0.85);
    }

    .logoText:hover {
      color: var(--text-accent);
      text-decoration: none;
    }

    .uiPanel,
    .specialSettings,
    .winCard,
    .statsPanel {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: var(--ui-radius);
      box-shadow: var(--ui-shadow);
    }

    .uiCell,
    .readout,
    .tokenReadout {
      background: var(--ui-bg);
      border: var(--ui-border);
      border-radius: 8px;
      box-shadow: var(--ui-shadow);
    }

    .uiButton,
    .arrowButton,
    .infoButton,
    .codeButton,
    .devButton,
    .resetButton {
      background: var(--button-bg);
      border: var(--button-border);
      border-radius: var(--button-radius);
      color: var(--button-text);
      cursor: pointer;
    }

    .slotFrame {
      position: relative;
      margin: 8px auto 12px;
      width: fit-content;
      height: 390px;
      overflow: hidden;
      padding: 8px;
      border-radius: 18px;
      background: var(--slot-bg);
      border: var(--ui-border);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.78);
    }

    .slotGrid {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      grid-template-rows: repeat(5, 80px);
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
      transform: translateY(-18px);
    }

    .cell {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: var(--cell-bg);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .teaserCell {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
      transform: scaleY(0.5) scaleX(0.92);
    }

    .activeCell {
      opacity: 1;
      filter: none;
    }

    .spinning {
      animation: shake 0.08s linear infinite;
      filter: none;
    }

    .teaserCell.spinning {
      opacity: 0.12;
      filter: grayscale(1) brightness(0.45);
    }

    .winningCell {
      border: 3px solid var(--accent);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.28),
        0 0 10px var(--accent),
        0 0 20px var(--accent),
        0 0 30px var(--accent-soft);
      animation: winPulse 0.9s ease-in-out infinite alternate;
      z-index: 3;
    }

    .wildCell {
      border: 3px solid #ffffff;
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.35),
        0 0 12px rgba(255,255,255,0.85),
        0 0 24px var(--accent),
        0 0 36px var(--accent-soft);
      animation: winPulse 0.75s ease-in-out infinite alternate;
      z-index: 3;
    }

    @keyframes winPulse {
      from {
        filter: brightness(1);
      }

      to {
        filter: brightness(1.28);
      }
    }

    @keyframes shake {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(6px); }
    }

    .lineOverlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 6;
      display: block;
      opacity: 0.95;
    }

    .lineOverlay svg {
      width: 100%;
      height: 100%;
    }

    .lineOverlay polyline {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 2px black)
        drop-shadow(0 0 3px currentColor);
      opacity: 0.65;
    }

    .lineOverlay polygon {
      filter:
        drop-shadow(0 0 2px black)
        drop-shadow(0 0 3px currentColor);
      opacity: 0.75;
    }

    .lineOverlay .lineLabel {
      font-size: 15px;
      font-weight: bold;
      filter: drop-shadow(0 0 3px black);
    }

    .winPopup,
    .unlockPopup {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.76);
      border: 1px solid var(--accent);
      color: var(--text-accent);
      font-weight: bold;
      text-shadow: 0 0 10px var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      white-space: normal;
      text-align: center;
      line-height: 1.2;
    }

    .winPopup {
      bottom: 18px;
      font-size: 24px;
      width: auto;
      max-width: 82%;
    }

    .unlockPopup {
      top: 44%;
      font-size: 20px;
      width: 82%;
      max-width: 360px;
    }

    .winPopup.show,
    .unlockPopup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .controlPanel {
      margin-top: 8px;
      padding: 6px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .controlTopRow,
    .controlBottomRow,
    .gemRow {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .controlTopRow {
      grid-template-columns: 1fr 1.4fr;
      margin-bottom: 5px;
    }

    .controlBottomRow {
      grid-template-columns: 1fr 1fr 1.25fr;
    }

    .gemRow {
      grid-template-columns: 1fr 1fr 1.25fr;
      margin-top: 0;
      min-height: 42px;
    }

    .readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      padding: 4px 6px;
      color: var(--text-main);
    }

    .readoutLabel {
      color: var(--text-muted);
      font-size: 13px;
      min-width: 34px;
      text-align: right;
    }

    .readoutValue {
      color: var(--text-accent);
      font-size: 16px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
    }

    .tokenReadout {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 34px;
      padding: 4px 6px;
      line-height: 1.1;
      color: var(--text-accent);
      font-weight: bold;
    }

    .tokenReadout span:first-child {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: normal;
    }

    #tokenBalance {
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .arrowButton {
      width: 22px;
      height: 24px;
      padding: 0;
      margin: 0;
      font-size: 15px;
      font-weight: bold;
    }

    .spinButton {
      width: 100%;
      height: 42px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-soft);
    }

    .infoButton {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }

    .infoButton.active {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chaosGem {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chaosGem img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      pointer-events: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .chaosGem:hover img {
      transform: scale(1.08);
    }

    .gemMessage {
      min-height: 16px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      opacity: 0.95;
      color: var(--text-accent);
    }

    .gem-clear img {
      filter: brightness(1.15) saturate(0.45)
        drop-shadow(0 0 6px rgba(190,230,255,0.45));
    }

    .gem-ruby img,
    .reelGem.gem-ruby {
      filter: sepia(1) saturate(5) hue-rotate(310deg) brightness(1.15)
        drop-shadow(0 0 12px #e31b4f);
    }

    .gem-emerald img,
    .reelGem.gem-emerald {
      filter: sepia(1) saturate(4) hue-rotate(85deg) brightness(1.15)
        drop-shadow(0 0 12px #20c56b);
    }

    .gem-amethyst img,
    .reelGem.gem-amethyst {
      filter: sepia(1) saturate(4) hue-rotate(235deg) brightness(1.2)
        drop-shadow(0 0 12px #9b5de5);
    }

    .gem-sapphire img,
    .reelGem.gem-sapphire {
      filter: sepia(1) saturate(4) hue-rotate(185deg) brightness(1.15)
        drop-shadow(0 0 12px #2f6fff);
    }

    .gem-topaz img,
    .reelGem.gem-topaz {
      filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.25)
        drop-shadow(0 0 12px #f5b642);
    }

    .gem-skull {
      font-size: 31px;
      color: #d8d8d8;
      text-shadow: 0 0 14px rgba(255,255,255,0.95);
    }

    .reelGem.gem-skull {
      filter: grayscale(1) brightness(1.4)
        drop-shadow(0 0 12px #ffffff);
    }

    .specialSettings {
      margin-top: 12px;
      padding: 10px;
      text-align: left;
    }

    .specialTitle,
    .panelTitle,
    .devSectionTitle,
    .statGroupTitle,
    .winCard strong {
      color: var(--text-accent);
      font-weight: bold;
      text-align: center;
    }

    .specialTitle {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .themeControl {
      display: grid;
      grid-template-columns: auto 28px 150px 28px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .themeLabel {
      color: var(--text-muted);
      font-size: 13px;
    }

    .themeValue {
      color: var(--text-accent);
      width: 150px;
      text-align: center;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .infoButtonRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .soundButtonRow {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .lastSpin {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
      min-height: 0;
      display: none;
    }

    .statGroup {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .statGroup:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .statGroupTitle {
      margin-bottom: 5px;
      font-size: 12px;
    }

    .statRow,
    .breakdownRow,
    .unlockRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .statRow:last-child,
    .breakdownRow:last-child,
    .unlockRow:last-child {
      border-bottom: none;
    }

    .judgementGood {
      color: #39ff88;
      font-weight: bold;
    }

    .judgementSuspicious {
      color: #f5b642;
      font-weight: bold;
    }

    .judgementVoid {
      color: #ff4444;
      font-weight: bold;
    }

    .devTools {
      display: none;
    }

    .devTools.visible {
      display: none;
    }

    .devButtonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .devButton {
      color: var(--button-text);
      padding: 7px 5px;
      font-size: 11px;
    }

    .devButton:hover,
    .arrowButton:hover,
    .infoButton:hover,
    .codeButton:hover,
    .resetButton:hover {
      color: var(--text-accent);
      border-color: var(--accent);
    }

    .winInfo {
      margin-top: 12px;
      border-top: 1px solid #333;
      padding-top: 10px;
      text-align: left;
      font-size: 13px;
      color: var(--text-main);
    }

    .winCard {
      padding: 10px;
      line-height: 1.5;
    }

    .winCard strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .winRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 3px 0;
    }

    .winRow:last-child {
      border-bottom: none;
    }

    .winGap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--accent-soft);
    }

    .bottomStats {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .codeArea {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .codeInput {
      background: var(--button-bg);
      color: var(--text-main);
      border: var(--ui-border);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      outline: none;
    }

    .codeInput:focus {
      border-color: var(--accent);
    }

    .codeButton {
      padding: 8px 12px;
      font-size: 13px;
    }

    .codeMessage {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 12px;
      min-height: 16px;
    }

    .resetButton {
      margin-top: 10px;
      width: 100%;
      color: var(--button-text);
      font-size: 12px;
      padding: 8px;
    }

    @media (max-width: 600px) {
      .game {
        width: 94vw;
        padding: 10px;
      }

      .slotGrid {
        grid-template-columns: repeat(5, 64px);
        grid-template-rows: repeat(5, 64px);
        gap: 8px;
        transform: translateY(-14px);
      }

      .cell {
        width: 64px;
        height: 64px;
        font-size: 30px;
      }

      .slotFrame {
        height: 310px;
      }

      .controlTopRow,
      .controlBottomRow,
      .gemRow {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .readout,
      .tokenReadout {
        min-height: 30px;
        padding: 3px 5px;
      }

      #tokenBalance {
        font-size: 12px;
        letter-spacing: 0;
      }

      .spinButton {
        height: 38px;
      }

      .themeControl {
        grid-template-columns: auto 28px 130px 28px;
      }

      .themeValue {
        width: 130px;
      }

      .winPopup {
        font-size: 20px;
        bottom: 16px;
      }

      .unlockPopup {
        font-size: 16px;
        width: 82%;
        max-width: 320px;
      }

      .devButtonGrid {
        grid-template-columns: repeat(2, 1fr);
      }

      .statRow,
      .breakdownRow,
      .unlockRow {
        font-size: 12px;
        gap: 6px;
      }
    }
  </style>


<!-- =========================
     SECTION 2: HTML BODY
     ========================= -->

</head>

<body>
  <div class="game">
    <a class="logoText" href="https://magnettaforged.com" target="_blank" rel="noopener">
      Forge Spin
    </a>

    <div class="slotFrame">
      <div class="lineOverlay" id="lineOverlay"></div>
      <div class="slotGrid" id="slotGrid"></div>
      <div class="winPopup" id="winPopup"></div>
      <div class="unlockPopup" id="unlockPopup"></div>
    </div>

    <div class="controlPanel">
      <div class="controlTopRow">
        <div class="readout">
          <span class="readoutLabel">Lines</span>
          <button class="arrowButton" onclick="changeLineCount(-1)">‹</button>
          <span class="readoutValue" id="lineCountDisplay">15</span>
          <button class="arrowButton" onclick="changeLineCount(1)">›</button>
        </div>

        <div class="tokenReadout">
          <span>Forge Tokens</span>
          <span id="tokenBalance">000,000,000,000,000,000</span>
        </div>
      </div>

      <div class="controlBottomRow">
        <div class="readout">
          <span class="readoutLabel">Bet</span>
          <button class="arrowButton" onclick="changeBaseBet(-1)">‹</button>
          <span class="readoutValue" id="baseBetDisplay">Free</span>
          <button class="arrowButton" onclick="changeBaseBet(1)">›</button>
        </div>

        <div class="readout">
          <span class="readoutLabel">Multi</span>
          <button class="arrowButton" onclick="changeMultiplier(-1)">‹</button>
          <span class="readoutValue" id="multiplierDisplay">1x</span>
          <button class="arrowButton" onclick="changeMultiplier(1)">›</button>
        </div>

        <button class="spinButton" id="spinButton" onclick="spin()">FREE</button>
      </div>

      <div class="gemRow">
        <div></div>

        <div>
          <button class="chaosGem gem-clear" id="chaosGem" onclick="activateGem()" title="Chaos Gem">
            <img src="gem.png" alt="Chaos Gem">
          </button>
          <div class="gemMessage" id="gemMessage"></div>
        </div>

        <div></div>
      </div>
    </div>

    <div class="specialSettings">
      <div class="specialTitle">Special Settings</div>

      <div class="themeControl">
        <span class="themeLabel">Theme</span>
        <button class="arrowButton" onclick="changeTheme(-1)">‹</button>
        <span class="themeValue" id="themeDisplay">Default</span>
        <button class="arrowButton" onclick="changeTheme(1)">›</button>
      </div>

      <div class="infoButtonRow">
        <button class="infoButton" id="statsButton" onclick="setInfoMode('stats')">
          Statistics
        </button>

        <button class="infoButton" id="breakdownButton" onclick="setInfoMode('breakdown')">
          Win Breakdown
        </button>
      </div>

      <div class="soundButtonRow">
        <button class="infoButton" id="soundButton" onclick="toggleSound()">
          Sound: On
        </button>
      </div>

      <div class="lastSpin" id="lastSpin">No spin yet.</div>

      <div class="devTools" id="devTools">
        <div id="unlockContent"></div>
      </div>
    </div>

    <div class="winInfo" id="winInfo"></div>

    <div class="bottomStats">
      Total Spins: <span id="spinCount">0</span>
    </div>

    <div class="codeArea">
      <input class="codeInput" id="codeInput" placeholder="Enter code" autocomplete="off">
      <button class="codeButton" onclick="applyCode()">Apply</button>
    </div>

    <div class="codeMessage" id="codeMessage"></div>

    <button class="resetButton" onclick="resetGame()">Reset Game</button>
  </div>


  <script>
    // =========================
    // SECTION 3: SETTINGS / SYMBOLS / STATE
    // =========================

    // =========================
    // CORE SETTINGS
    // =========================

    const VISIBLE_ROWS = 5;
    const COLS = 5;

    const baseBetOptions = [0, 25, 50, 75, 100];
    const multiplierOptions = [1, 10, 50, 100, 1000, 2500, 5000, 10000, 25000, 50000, 100000, 1000000, 10000000, 50000000];
    const lineCountOptions = [5, 10, 15];

    const characterSymbols = ["Maya", "Reign", "Kyra", "Nadia"];
    const variantGemKeys = ["ruby", "emerald", "sapphire", "amethyst", "topaz", "skull"];

    const defaultLineColors = [

    // =========================
    // LINE PREVIEW / WINNING LINE OVERLAY
    // Keeps yesterday's fixed mobile fitment.
    // =========================

    function getGridMetrics() {
      const mobile = window.innerWidth <= 600;
      const cellSize = mobile ? 64 : 80;
      const gap = 8;
      const pitch = cellSize + gap;
      const gridTop = mobile ? -10 : -10;
      const gridLeft = 8;

      return {
        viewW: mobile ? 370 : 456,
        viewH: mobile ? 310 : 390,
        cellSize,
        gap,
        pitch,
        gridTop,
        gridLeft
      };
    }

    function getLinePoints(line) {
      const m = getGridMetrics();

      const rowMap = {
        1: m.gridTop + m.pitch * 1 + m.cellSize / 2,
        2: m.gridTop + m.pitch * 2 + m.cellSize / 2,
        3: m.gridTop + m.pitch * 3 + m.cellSize / 2
      };

      const colX = col => m.gridLeft + m.pitch * col + m.cellSize / 2;

      return line.rows.map((row, col) => ({
        x: colX(col),
        y: rowMap[row]
      }));
    }

    function drawSingleLinePreview() {
      if (!lineOverlayVisible) return;

      const activeLines = getActivePaylines();
      if (activeLines.length === 0) return;

      const line = activeLines[linePreviewIndex % activeLines.length];
      const color = lineColors[linePreviewIndex % lineColors.length];
      const points = getLinePoints(line);
      const m = getGridMetrics();

      const pointString = points.map(p => `${p.x},${p.y}`).join(" ");
      const last = points[points.length - 1];
      const prev = points[points.length - 2];

      const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
      const arrowSize = 10;

      const arrowP1 = {
        x: last.x - arrowSize * Math.cos(angle - Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle - Math.PI / 6)
      };

      const arrowP2 = {
        x: last.x - arrowSize * Math.cos(angle + Math.PI / 6),
        y: last.y - arrowSize * Math.sin(angle + Math.PI / 6)
      };

      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none" style="color:${color}">
          <text class="lineLabel" x="18" y="32" fill="${color}">${line.name}</text>
          <polyline points="${pointString}" stroke="${color}" />
          <polygon points="${last.x},${last.y} ${arrowP1.x},${arrowP1.y} ${arrowP2.x},${arrowP2.y}" fill="${color}" />
        </svg>
      `;

      linePreviewIndex++;
    }

    function drawWinningLines(wins) {
      if (!wins.length) {
        hideLineOverlay();
        return;
      }

      stopLinePreview();

      const m = getGridMetrics();

      const lineSvgs = wins.map((win, index) => {
        const color = lineColors[index % lineColors.length];
        const line = paylines.find(payline => payline.name === win.lineName);

        if (!line) return "";

        const points = getLinePoints(line);
        const pointString = points.map(p => `${p.x},${p.y}`).join(" ");

        return `
          <polyline points="${pointString}" stroke="${color}" />
        `;
      }).join("");

      lineOverlayVisible = true;
      lineOverlay.style.display = "block";
      lineOverlay.innerHTML = `
        <svg viewBox="0 0 ${m.viewW} ${m.viewH}" preserveAspectRatio="none">
          ${lineSvgs}
        </svg>
      `;
    }

      if (gemKey !== "diamond") {

    // =========================
    // SECTION 5: ODDS / PAYOUTS / WIN EVALUATION
    // =========================

    // =========================
    // ODDS DISPLAY
    // =========================

    function getSymbolProbabilities() {
      const counts = {};
      const total = symbolPool.length;

      symbolPool.forEach(symbol => {
        counts[symbol.name] = (counts[symbol.name] || 0) + 1;
      });

      return Object.values(counts).map(count => count / total);
    }

    function calculateOdds() {
      const probabilities = getSymbolProbabilities();
      const activeLines = getActivePaylines().length;

      let twoInRow = 0;
      let threeInRow = 0;
      let fourInRow = 0;
      let fiveInRow = 0;

      probabilities.forEach(p => {
        twoInRow += Math.pow(p, 2) * (1 - p);
        threeInRow += Math.pow(p, 3) * (1 - p);
        fourInRow += Math.pow(p, 4) * (1 - p);
        fiveInRow += Math.pow(p, 5);
      });

      const anyLineWin = twoInRow + threeInRow + fourInRow + fiveInRow;

      // Approximate only. True odds are higher because of Wilds and right-to-left wins.
      const approxAnySpinWin = 1 - Math.pow(1 - anyLineWin, activeLines * 2);

      return {
        twoInRow,
        threeInRow,
        fourInRow,
        fiveInRow,
        approxAnySpinWin
      };
    }

    function formatOdds(probability) {
      if (probability <= 0) return "Never";

      const oneIn = Math.round(1 / probability).toLocaleString();
      const percent = (probability * 100).toFixed(probability < 0.001 ? 4 : 2);

      return `${percent}% / 1 in ${oneIn}`;
    }

    // =========================
    // PAYOUT TABLES
    // =========================

    const payoutTables = {
      free: {
        Axe: { 2: 15, 3: 75, 4: 200, 5: 750 },
        Animal: { 2: 15, 3: 75, 4: 200, 5: 750 },
        Gem: { 2: 100, 3: 400, 4: 1250, 5: 5000 },
        Wild: { 2: 100, 3: 400, 4: 1250, 5: 5000 },
        default: { 2: 40, 3: 175, 4: 500, 5: 1500 }
      },

      paid: {
        Axe: { 2: 0.75, 3: 4, 4: 15, 5: 75 },
        Animal: { 2: 0.75, 3: 4, 4: 15, 5: 75 },
        Gem: { 2: 3, 3: 15, 4: 75, 5: 350 },
        Wild: { 2: 3, 3: 15, 4: 75, 5: 350 },
        default: { 2: 1.5, 3: 8, 4: 35, 5: 150 }
      }
    };

    function getPayoutTable(mode, symbolName) {
      const tableSet = payoutTables[mode];
      return tableSet[symbolName] || tableSet.default;
    }

    function freePayoutForMatch(matchCount, symbolName) {
      const table = getPayoutTable("free", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function paidMultiplierForMatch(matchCount, symbolName) {
      const table = getPayoutTable("paid", symbolName);

      if (matchCount >= 5) return table[5];
      if (matchCount === 4) return table[4];
      if (matchCount === 3) return table[3];
      if (matchCount === 2) return table[2];

      return 0;
    }

    function paidPayoutForMatch(matchCount, symbolName, lineBet) {
      return Math.floor(lineBet * paidMultiplierForMatch(matchCount, symbolName));
    }

    function payoutForWin(win, finalBet, lineBet) {
      if (finalBet === 0) {
        return freePayoutForMatch(win.matchCount, win.symbol);
      }

      return paidPayoutForMatch(win.matchCount, win.symbol, lineBet);
    }

    // =========================
    // GRID BUILDING
    // =========================

    function buildFinalGrid() {
      const grid = [];

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        grid[row] = [];

        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomSymbol();
        }
      }

      return grid;
    }

    // =========================
    // WIN HELPERS
    // =========================

    function isWild(symbol) {
      return symbol && symbol.name === "Wild";
    }

    function symbolsMatch(baseSymbol, testSymbol) {
      if (!baseSymbol || !testSymbol) return false;
      if (isWild(baseSymbol) || isWild(testSymbol)) return true;

      return baseSymbol.name === testSymbol.name;
    }

    function getBestBaseSymbol(symbols) {
      const nonWild = symbols.find(symbol => !isWild(symbol));

      if (nonWild) return nonWild;

      return { name: "Wild", type: "image", value: "wild.png" };
    }

    function countLeadingWilds(symbols) {
      let count = 0;

      for (let i = 0; i < symbols.length; i++) {
        if (isWild(symbols[i])) {
          count++;
        } else {
          break;
        }
      }

      return count;
    }

    function isPureWildChain(symbols) {
      return symbols.length >= 2 && symbols.every(symbol => isWild(symbol));
    }

    function evaluateDirection(grid, line, direction) {
      const columns = direction === "LTR"
        ? [0, 1, 2, 3, 4]
        : [4, 3, 2, 1, 0];

      const firstCol = columns[0];
      const firstRow = line.rows[firstCol];
      const firstSymbol = grid[firstRow][firstCol];

      let checkedSymbols = [firstSymbol];
      let baseSymbol = isWild(firstSymbol) ? null : firstSymbol;
      let matchCount = 1;
      let cells = [{ row: firstRow, col: firstCol }];

      for (let i = 1; i < columns.length; i++) {
        const col = columns[i];
        const row = line.rows[col];
        const symbol = grid[row][col];

        if (!baseSymbol && !isWild(symbol)) {
          baseSymbol = symbol;
        }

        const compareBase = baseSymbol || firstSymbol;

        if (symbolsMatch(compareBase, symbol)) {
          matchCount++;
          checkedSymbols.push(symbol);
          cells.push({ row, col });
        } else {
          break;
        }
      }

      if (matchCount < 2) return null;

      const payingSymbol = baseSymbol || getBestBaseSymbol(checkedSymbols);
      const pureWild = isPureWildChain(checkedSymbols);
      const leadingWildCount = countLeadingWilds(checkedSymbols);

      return {
        lineName: line.name,
        direction,
        symbol: payingSymbol.name,
        matchCount,
        wildCount: leadingWildCount,
        cells,
        pureWild
      };
    }

    function evaluatePaylines(grid) {
      const wins = [];
      const activePaylines = getActivePaylines();

      activePaylines.forEach(line => {
        const leftWin = evaluateDirection(grid, line, "LTR");
        const rightWin = evaluateDirection(grid, line, "RTL");

        // Prevent double-paying the same full 5-symbol line.
        if (leftWin && rightWin && leftWin.matchCount === 5 && rightWin.matchCount === 5) {
          wins.push(leftWin);
          return;
        }

        if (leftWin) wins.push(leftWin);
        if (rightWin) wins.push(rightWin);
      });

      return wins;
    }

    function countBonusSpinsFromWins(wins) {
      let earned = 0;

      wins.forEach(win => {
        if (win.wildCount >= 2) {
          earned += win.wildCount;
        }
      });

      return earned;
    }

    function checkThemeUnlocks(wins) {
      let unlockedSomething = false;

      wins.forEach(win => {
        if (win.matchCount < 5) return;

        if (characterSymbols.includes(win.symbol)) {
          handleCharacterThemeUnlock(win.symbol);
          unlockedSomething = true;
        }

        if (win.symbol === "Gem" || win.symbol === "Wild") {
          const wasUnlocked = unlockTheme("Winky");

          if (wasUnlocked) {
            applyUnlockedTheme("Winky");
            showUnlockPopup("Winky Unlocked");
            playSound("unlock");
            unlockedSomething = true;
          }
        }
      });

      if (unlockedSomething) {
        localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
        updateUnlockPanel();
      }

      syncThemeIndex();
    }

    function clearWinningHighlights() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("winningCell");
        cell.classList.remove("wildCell");
      });
    }

    function highlightWins(wins) {
      wins.forEach(win => {
        win.cells.forEach(cellPosition => {
          const cell = getCell(cellPosition.row, cellPosition.col);
          cell.classList.add("winningCell");

          const img = cell.querySelector("img");

          if (img && img.alt === "Wild") {
            cell.classList.add("wildCell");
          }
        });
      });
    }

    function buildWinBreakdown(wins, finalBet, lineBet) {
      if (!wins.length) return [];

      return wins.map(win => {
        const payout = payoutForWin(win, finalBet, lineBet);

        const wildText = win.wildCount >= 2
          ? ` — Wild x${win.wildCount}`
          : "";

        const bonusText = finalBet > 0 && win.wildCount >= 2
          ? ` + ${win.wildCount} Bonus Spins`
          : "";

        return {
          text: `${win.lineName} ${win.direction}: ${win.matchCount}x ${win.symbol}${wildText}${bonusText}`,
          payout
        };
      });
    }

    function clearWinPopup() {
      if (winPopupTimer) {
        clearTimeout(winPopupTimer);
        winPopupTimer = null;
      }

      winPopup.classList.remove("show");
      winPopup.textContent = "";
    }

    function showWinPopup(amount) {
      if (amount <= 0) {
        clearWinPopup();
        return;
      }

      winPopup.textContent = `+${amount.toLocaleString()}`;
      winPopup.classList.add("show");

      winPopupTimer = setTimeout(() => {
        winPopup.classList.remove("show");
      }, 2500);
    }


    // =========================
    // SECTION 6: SPIN / DEV TOOLS / CODES / STATS / CLOSE
    // =========================

    // =========================
    // SPIN CONTROL
    // =========================

    function setControlsDisabled(disabled) {
      spinButton.disabled = disabled;

      document.querySelectorAll(".arrowButton").forEach(button => {
        button.disabled = disabled;
      });

      document.querySelectorAll(".infoButton").forEach(button => {
        button.disabled = disabled;
      });
    }

    function calculateSpinPayout(wins, finalBet, lineBet) {
      let payout = 0;

      wins.forEach(win => {
        payout += payoutForWin(win, finalBet, lineBet);
      });

      return payout;
    }

    function spin() {
      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      if (finalBet > tokens) {
        codeMessage.textContent = "Not enough Forge Tokens.";
        playSound("click");
        return;
      }

      if (finalBet > 0) {
        tokens -= finalBet;
        localStorage.setItem("forgeTokens", tokens);
        updateDisplay();
      }

      animateSpin(finalBet, lineBet, "normal");
    }

    function animateSpin(finalBet, lineBet, spinType = "normal") {
      playSound("spin");
      hideLineOverlay();
      clearWinPopup();
      clearWinningHighlights();
      setControlsDisabled(true);

      if (spinType === "bonus") {
        const currentBonusNumber = bonusSessionPlayed + 1;
        showUnlockPopup(`Bonus Spin ${currentBonusNumber} / ${bonusSessionTotal}`);
      }

      const finalGrid = buildFinalGrid();
      const intervals = [];

      for (let col = 0; col < COLS; col++) {
        intervals[col] = setInterval(() => {
          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            showSymbol(cell, randomSymbol());
            cell.classList.add("spinning");
          }
        }, 70);

        setTimeout(() => {
          clearInterval(intervals[col]);
          playSound("stop");

          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            cell.classList.remove("spinning");
            showSymbol(cell, finalGrid[row][col]);
          }

          if (col === COLS - 1) {
            finishSpin(finalGrid, finalBet, lineBet, spinType);
          }
        }, 900 + col * 350);
      }
    }

    function finishSpin(finalGrid, finalBet, lineBet, spinType = "normal") {
      const wins = evaluatePaylines(finalGrid);
      const payout = calculateSpinPayout(wins, finalBet, lineBet);

      const earnedBonusSpins = spinType === "normal" && finalBet > 0
        ? countBonusSpinsFromWins(wins)
        : 0;

      highlightWins(wins);
      drawWinningLines(wins);
      checkThemeUnlocks(wins);

      lastWinBreakdown = buildWinBreakdown(wins, finalBet, lineBet);

      tokens += payout;
      totalSpins += 1;
      lifetimeTokensEarned += payout;

      if (spinType === "normal") {
        lifetimeTokensWagered += finalBet;

        if (finalBet === 0) {
          lifetimeFreeGames += 1;
          lifetimeFreeWinnings += payout;
        } else {
          lifetimePaidGames += 1;
          lifetimePaidWagered += finalBet;
          lifetimePaidWinnings += payout;
        }
      }

      if (spinType === "bonus") {
        lifetimeBonusSpinsPlayed += 1;
        lifetimeBonusSpinWinnings += payout;
        bonusSessionPlayed += 1;
        bonusSessionWon += payout;
      }

      if (earnedBonusSpins > 0) {
        bonusSpinQueue += earnedBonusSpins;
        bonusSpinLineBet = lineBet;
        bonusSpinFinalBet = finalBet;
        bonusSpinSource = `${earnedBonusSpins} Bonus Spins`;

        bonusSessionTotal = earnedBonusSpins;
        bonusSessionPlayed = 0;
        bonusSessionWon = 0;

        lifetimeBonusSpinsEarned += earnedBonusSpins;
        showUnlockPopup(`${earnedBonusSpins} Bonus Spins Earned`);
        playSound("bonus");
      }

      if (payout > biggestSingleWin) {
        biggestSingleWin = payout;
      }

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      updateDisplay();
      showWinPopup(payout);

      if (payout > 0) {
        if (payout >= finalBet * 20 && finalBet > 0) {
          playSound("bigWin");
        } else {
          playSound("smallWin");
        }
      }

      if (bonusSpinQueue > 0) {
        setTimeout(runBonusSpin, BONUS_SPIN_DELAY);
      } else {
        if (spinType === "bonus" && bonusSessionTotal > 0) {
          showUnlockPopup(`Bonus Tokens Won<br>${bonusSessionWon.toLocaleString()}`);
          bonusSessionTotal = 0;
          bonusSessionPlayed = 0;
          bonusSessionWon = 0;
        }

        setControlsDisabled(false);
      }
    }

    function runBonusSpin() {
      if (bonusSpinQueue <= 0) {
        setControlsDisabled(false);
        return;
      }

      bonusSpinQueue -= 1;
      animateSpin(bonusSpinFinalBet, bonusSpinLineBet, "bonus");
    }

    // =========================
    // QUICK SPIN DEV TOOL
    // =========================

    function quickSpin(amount) {
      markDevToolsUsed();
      playSound("click");

      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      let totalPayout = 0;
      let totalWagered = 0;
      let completedSpins = 0;
      let earnedBonusTotal = 0;
      let playedBonusTotal = 0;

      for (let i = 0; i < amount; i++) {
        if (finalBet > tokens) break;

        if (finalBet > 0) {
          tokens -= finalBet;
          totalWagered += finalBet;
        }

        const grid = buildFinalGrid();
        const wins = evaluatePaylines(grid);
        const spinPayout = calculateSpinPayout(wins, finalBet, lineBet);
        const earnedBonusSpins = finalBet > 0 ? countBonusSpinsFromWins(wins) : 0;

        checkThemeUnlocks(wins);

        tokens += spinPayout;
        totalPayout += spinPayout;
        totalSpins += 1;
        completedSpins += 1;

        lifetimeTokensEarned += spinPayout;
        lifetimeTokensWagered += finalBet;

        if (finalBet === 0) {
          lifetimeFreeGames += 1;
          lifetimeFreeWinnings += spinPayout;
        } else {
          lifetimePaidGames += 1;
          lifetimePaidWagered += finalBet;
          lifetimePaidWinnings += spinPayout;
        }

        if (earnedBonusSpins > 0) {
          lifetimeBonusSpinsEarned += earnedBonusSpins;
          earnedBonusTotal += earnedBonusSpins;

          for (let b = 0; b < earnedBonusSpins; b++) {
            const bonusGrid = buildFinalGrid();
            const bonusWins = evaluatePaylines(bonusGrid);
            const bonusPayout = calculateSpinPayout(bonusWins, finalBet, lineBet);

            checkThemeUnlocks(bonusWins);

            tokens += bonusPayout;
            totalPayout += bonusPayout;
            totalSpins += 1;

            lifetimeTokensEarned += bonusPayout;
            lifetimeBonusSpinsPlayed += 1;
            lifetimeBonusSpinWinnings += bonusPayout;
            playedBonusTotal += 1;

            if (bonusPayout > biggestSingleWin) {
              biggestSingleWin = bonusPayout;
            }
          }
        }

        if (spinPayout > biggestSingleWin) {
          biggestSingleWin = spinPayout;
        }
      }

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      saveStats();
      clearWinningHighlights();
      clearWinPopup();
      hideLineOverlay();
      updateDisplay();

      const net = totalPayout - totalWagered;
      const sign = net >= 0 ? "+" : "-";

      codeMessage.textContent =
        `Quick Spin: ${completedSpins} spins | Bonus ${playedBonusTotal}/${earnedBonusTotal} | Net ${sign}${Math.abs(net).toLocaleString()}`;
    }

    // =========================
    // STATS / INFO AREA
    // =========================

    function saveStats() {
      if (tokens > highestBalance) {
        highestBalance = tokens;
      }

      localStorage.setItem("lifetimeTokensEarned", lifetimeTokensEarned);
      localStorage.setItem("lifetimeTokensWagered", lifetimeTokensWagered);
      localStorage.setItem("biggestSingleWin", biggestSingleWin);
      localStorage.setItem("highestBalance", highestBalance);
      localStorage.setItem("devToolsUsed", devToolsUsed ? "true" : "false");
      localStorage.setItem("promoTokensRedeemed", promoTokensRedeemed);

      localStorage.setItem("lifetimeFreeGames", lifetimeFreeGames);
      localStorage.setItem("lifetimeFreeWinnings", lifetimeFreeWinnings);

      localStorage.setItem("lifetimePaidGames", lifetimePaidGames);
      localStorage.setItem("lifetimePaidWagered", lifetimePaidWagered);
      localStorage.setItem("lifetimePaidWinnings", lifetimePaidWinnings);

      localStorage.setItem("lifetimeBonusSpinsEarned", lifetimeBonusSpinsEarned);
      localStorage.setItem("lifetimeBonusSpinsPlayed", lifetimeBonusSpinsPlayed);
      localStorage.setItem("lifetimeBonusSpinWinnings", lifetimeBonusSpinWinnings);
    }

    function markDevToolsUsed() {
      devToolsUsed = true;
      saveStats();
      updateDisplay();

    function getPaidReturnRate() {
      if (lifetimePaidWagered <= 0) return 0;
      return (lifetimePaidWinnings / lifetimePaidWagered) * 100;
    }

    function getOverallReturnRate() {
      if (lifetimeTokensWagered <= 0) return 0;
      return (lifetimeTokensEarned / lifetimeTokensWagered) * 100;
    }

    function getNetGain() {
      return lifetimeTokensEarned - lifetimeTokensWagered;
    }

    function getUnlockCount() {
      return Object.keys(themes).filter(themeKey => unlockedThemes[themeKey]).length;
    }

    function getTotalUnlockCount() {
      return Object.keys(themes).length;
    }

    function getWinkyJudgement() {
      const paidReturn = getPaidReturnRate();

      if (devToolsUsed) {
        return {
          text: "Void — Timeline Corrupted",
          className: "judgementVoid"
        };
      }

      if (tokens >= 8000000000 && totalSpins < 100) {
        return {
          text: "Void — Impossible Snack Behavior",
          className: "judgementVoid"
        };
      }

      if (lifetimePaidGames >= 1000 && paidReturn > 250) {
        return {
          text: "Suspicious Snack",
          className: "judgementSuspicious"
        };
      }

      if (lifetimePaidGames >= 5000 && paidReturn > 180) {
        return {
          text: "Unusually Blessed",
          className: "judgementSuspicious"
        };
      }

      return {
        text: "Acceptable Mortal",
        className: "judgementGood"
      };
    }

    function renderOddsInfo() {
      const activeLines = getActivePaylines().length;
      const odds = calculateOdds();

      return `
        <div class="winCard">
          <strong>Possibilities & Odds — ${activeLines} Lines</strong>

          <div class="winRow">
            <span>2 in row</span>
            <span>${formatOdds(odds.twoInRow)}</span>
          </div>

          <div class="winRow">
            <span>3 in row</span>
            <span>${formatOdds(odds.threeInRow)}</span>
          </div>

          <div class="winRow">
            <span>4 in row</span>
            <span>${formatOdds(odds.fourInRow)}</span>
          </div>

          <div class="winRow">
            <span>5 in row</span>
            <span>${formatOdds(odds.fiveInRow)}</span>
          </div>

          <div class="winRow winGap">
            <span>Hit Chance</span>
            <span>${formatOdds(odds.approxAnySpinWin)}</span>
          </div>
        </div>
      `;
    }

    function renderStatsInfo() {
      const paidReturn = getPaidReturnRate();
      const overallReturn = getOverallReturnRate();
      const netGain = getNetGain();
      const judgement = getWinkyJudgement();
      const netSign = netGain >= 0 ? "+" : "-";

      return `
        <div class="winCard">
          <strong>Statistics</strong>

          <div class="statGroup">
            <div class="statGroupTitle">Judgement</div>
            <div class="statRow">
              <span>Winky’s Judgement</span>
              <span class="${judgement.className}">${judgement.text}</span>
            </div>
            <div class="statRow">
              <span>Unlocks Found</span>
              <span>${getUnlockCount()} / ${getTotalUnlockCount()}</span>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Free Play</div>
            <div class="statRow">
              <span>Free Games</span>
              <span>${lifetimeFreeGames.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Free Winnings</span>
              <span>${lifetimeFreeWinnings.toLocaleString()}</span>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Paid Play</div>
            <div class="statRow">
              <span>Paid Games</span>
              <span>${lifetimePaidGames.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Paid Wagered</span>
              <span>${lifetimePaidWagered.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Paid Winnings</span>
              <span>${lifetimePaidWinnings.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Paid Return</span>
              <span>${paidReturn.toFixed(2)}%</span>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Bonus Spins</div>
            <div class="statRow">
              <span>Bonus Spins Earned</span>
              <span>${lifetimeBonusSpinsEarned.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Bonus Spins Played</span>
              <span>${lifetimeBonusSpinsPlayed.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Bonus Spin Winnings</span>
              <span>${lifetimeBonusSpinWinnings.toLocaleString()}</span>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Overall</div>
            <div class="statRow">
              <span>Total Spins</span>
              <span>${totalSpins.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Total Tokens Earned</span>
              <span>${lifetimeTokensEarned.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Total Wagered</span>
              <span>${lifetimeTokensWagered.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Net Gain</span>
              <span>${netSign}${Math.abs(netGain).toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Overall Return</span>
              <span>${overallReturn.toFixed(2)}%</span>
            </div>
            <div class="statRow">
              <span>Highest Balance</span>
              <span>${highestBalance.toLocaleString()}</span>
            </div>
            <div class="statRow">
              <span>Biggest Win</span>
              <span>${biggestSingleWin.toLocaleString()}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderBreakdownInfo() {
      if (!lastWinBreakdown.length) {
        return `
          <div class="winCard">
            <strong>Last Win Breakdown</strong>
            <div class="breakdownRow">
              <span>No wins recorded yet.</span>
              <span></span>
            </div>
          </div>
        `;
      }

      return `
        <div class="winCard">
          <strong>Last Win Breakdown</strong>
          ${lastWinBreakdown.map(item => `
            <div class="breakdownRow">
              <span>${item.text}</span>
              <span>${item.payout > 0 ? "+" + item.payout.toLocaleString() : ""}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderUnlockRows() {
      const baseThemes = Object.keys(themes).filter(key => themes[key].unlockType === "base");
      const variantThemes = Object.keys(themes).filter(key => themes[key].unlockType === "variant");
      const specialThemes = Object.keys(themes).filter(key => themes[key].unlockType === "special");

      const baseFound = baseThemes.filter(key => unlockedThemes[key]).length;
      const variantFound = variantThemes.filter(key => unlockedThemes[key]).length;
      const specialFound = specialThemes.filter(key => unlockedThemes[key]).length;

      let rows = `
        <div class="unlockRow">
          <span>Total Unlocks</span>
          <span>${getUnlockCount()} / ${getTotalUnlockCount()}</span>
        </div>
        <div class="unlockRow">
          <span>Base Themes</span>
          <span>${baseFound} / ${baseThemes.length}</span>
        </div>
        <div class="unlockRow">
          <span>Gem Variants</span>
          <span>${variantFound} / ${variantThemes.length}</span>
        </div>
        <div class="unlockRow">
          <span>Special Themes</span>
          <span>${specialFound} / ${specialThemes.length}</span>
        </div>
      `;

      Object.keys(themes).forEach(themeKey => {
        if (themeKey === "Default") return;

        const label = themes[themeKey].label || themeKey;
        const found = unlockedThemes[themeKey];

        rows += `
          <div class="unlockRow">
            <span>${label}</span>
            <span>${found ? "Found" : "Locked"}</span>
          </div>
        `;
      });

      return rows;
    }

    function renderDevToolsInfo() {
      if (!devToolsUnlocked) {
        return renderOddsInfo();
      }

      return `
        <div class="winCard">
          <strong>Dev Tools</strong>

          <div class="statGroup">
            <div class="statGroupTitle">Theme Tools</div>
            <div class="devButtonGrid">
              <button class="devButton" onclick="unlockAllThemes()">Unlock All</button>
              <button class="devButton" onclick="activateThemeDev('Maya')">Activate Maya</button>
              <button class="devButton" onclick="activateThemeDev('Reign')">Activate Reign</button>
              <button class="devButton" onclick="activateThemeDev('Kyra')">Activate Kyra</button>
              <button class="devButton" onclick="activateThemeDev('Nadia')">Activate Nadia</button>
              <button class="devButton" onclick="activateThemeDev('Winky')">Activate Winky</button>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Token Tools</div>
            <div class="devButtonGrid">
              <button class="devButton" onclick="addDevTokens()">+100,000,000</button>
              <button class="devButton" onclick="quickSpin(100)">Quick Spin x100</button>
              <button class="devButton" onclick="quickSpin(500)">Quick Spin x500</button>
            </div>
          </div>

          <div class="statGroup">
            <div class="statGroupTitle">Unlock Tracker</div>
            <button class="devButton" onclick="toggleDevUnlocks()" style="width:100%;">
              Show / Hide Unlocks
            </button>
            <div id="devUnlockInfo">
              ${devUnlockInfoVisible ? renderUnlockRows() : ""}
            </div>
          </div>
        </div>
      `;
    }

    function updateWinInfo() {
      const winInfo = document.getElementById("winInfo");
      if (!winInfo) return;

      if (activePanel === "stats") {
        winInfo.innerHTML = renderStatsInfo();
        return;
      }

      if (activePanel === "breakdown") {
        winInfo.innerHTML = renderBreakdownInfo();
        return;
      }

      if (activePanel === "dev") {
        winInfo.innerHTML = renderDevToolsInfo();
        return;
      }

      winInfo.innerHTML = renderOddsInfo();
    }

    function updateUnlockPanel() {
      if (unlockContent) {
        unlockContent.innerHTML = renderUnlockRows();
      }

      if (activePanel === "dev") {
        updateWinInfo();
      }
    }

    // =========================
    // DEV TOOLS
    // =========================

    function updateDevToolsVisibility() {
      if (devTools) {
        devTools.classList.remove("visible");
      }
    }

    function activateThemeDev(themeName) {
      markDevToolsUsed();
      playSound("click");

      unlockTheme(themeName);
      applyUnlockedTheme(themeName);

      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      updateDisplay();

      codeMessage.textContent = `${themes[themeName]?.label || themeName} activated.`;
    }

    function unlockAllThemes() {
      markDevToolsUsed();
      playSound("click");

      Object.keys(themes).forEach(theme => {
        unlockedThemes[theme] = true;
      });

      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));

      syncThemeIndex();
      updateDisplay();

      codeMessage.textContent = "All themes unlocked.";
    }

    function addDevTokens() {
      markDevToolsUsed();
      playSound("click");

      tokens += 100000000;

      localStorage.setItem("forgeTokens", tokens);

      saveStats();
      updateDisplay();

      codeMessage.textContent = "+100,000,000 Forge Tokens added.";
    }

    // =========================
    // CODES
    // =========================

    function applyCode() {
      playSound("click");

      const code = codeInput.value.trim().toUpperCase();

      if (!code) {
        codeMessage.textContent = "Enter a code.";
        return;
      }

      const codeRewards = {
        EMAIL1000: () => {
          tokens += 1000;
          promoTokensRedeemed += 1000;
          localStorage.setItem("forgeTokens", tokens);
          saveStats();
          codeMessage.textContent = "+1,000 Forge Tokens.";
        },

        EVENT5000: () => {
          tokens += 5000;
          promoTokensRedeemed += 5000;
          localStorage.setItem("forgeTokens", tokens);
          saveStats();
          codeMessage.textContent = "+5,000 Forge Tokens.";
        },

        MAYAFOX: () => {
          unlockTheme("Maya");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Maya theme unlocked.";
        },

        REIGNBEAR: () => {
          unlockTheme("Reign");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Reign theme unlocked.";
        },

        KYRASCYTHE: () => {
          unlockTheme("Kyra");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Kyra theme unlocked.";
        },

        NADIASPELL: () => {
          unlockTheme("Nadia");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Nadia theme unlocked.";
        },

        WINKYCHAOS: () => {
          unlockTheme("Winky");
          localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
          codeMessage.textContent = "Winky theme unlocked.";
        },

        FORGEDEV: () => {
          devToolsUnlocked = true;
          localStorage.setItem("devToolsUnlocked", "true");

          markDevToolsUsed();

          activePanel = "dev";
          updateInfoButtons();
          updateWinInfo();

          codeMessage.textContent = "Dev tools unlocked.";
        }
      };

      if (codeRewards[code]) {
        codeRewards[code]();
        codeInput.value = "";

        syncThemeIndex();
        updateDisplay();
        updateDevToolsVisibility();
      } else {
        codeMessage.textContent = "Invalid code.";
      }
    }

    codeInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        applyCode();
      }
    });

    // =========================
    // RESET
    // =========================

    function resetGame() {
      playSound("click");

      tokens = 0;
      totalSpins = 0;

      lifetimeTokensEarned = 0;
      lifetimeTokensWagered = 0;
      biggestSingleWin = 0;
      highestBalance = 0;
      promoTokensRedeemed = 0;
      devToolsUsed = false;

      lifetimeFreeGames = 0;
      lifetimeFreeWinnings = 0;

      lifetimePaidGames = 0;
      lifetimePaidWagered = 0;
      lifetimePaidWinnings = 0;

      lifetimeBonusSpinsEarned = 0;
      lifetimeBonusSpinsPlayed = 0;
      lifetimeBonusSpinWinnings = 0;

      bonusSpinQueue = 0;
      bonusSpinLineBet = 0;
      bonusSpinFinalBet = 0;
      bonusSpinSource = "";

      bonusSessionTotal = 0;
      bonusSessionPlayed = 0;
      bonusSessionWon = 0;
      devUnlockInfoVisible = false;

      unlockedThemes = {};
      Object.keys(themes).forEach(themeKey => {
        unlockedThemes[themeKey] = themeKey === "Default";
      });

      activeTheme = "Default";
      themeIndex = 0;
      symbolPool = buildSymbolPool();

      devToolsUnlocked = false;
      activePanel = null;
      lastWinBreakdown = [];

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);
      localStorage.setItem("unlockedThemes", JSON.stringify(unlockedThemes));
      localStorage.setItem("activeTheme", activeTheme);
      localStorage.setItem("devToolsUnlocked", "false");

      saveStats();

      clearWinningHighlights();
      clearWinPopup();
      hideLineOverlay();

      applyTheme(activeTheme);
      createGrid();
      updateDisplay();
      updateDevToolsVisibility();
      startLinePreview();

      codeMessage.textContent = "Game reset. Tokens, stats, and theme progress reset.";
    }

    // =========================
    // RESIZE HANDLER
    // =========================

    window.addEventListener("resize", () => {
      if (lineOverlayVisible) {
        drawSingleLinePreview();
      }
    });
  </script>
</body>
</html>
